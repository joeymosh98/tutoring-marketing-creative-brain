<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Tutero Ads — Australia Paid Social</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #888;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    header h1 span { color: var(--muted); font-weight: 400; }
    .badge {
      font-size: 11px;
      background: #1e1b2e;
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    /* Mode tabs (top-level: Ads / Social) */
    .mode-tabs {
      display: flex;
      gap: 4px;
      padding: 12px 32px 0;
      border-bottom: 1px solid var(--border);
    }
    .mode-tab {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .mode-tab:hover { color: var(--text); }
    .mode-tab.active { color: var(--accent-hover); border-bottom-color: var(--accent); }

    /* Toolbar */
    .toolbar {
      padding: 16px 32px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar button:hover { border-color: var(--accent); color: #fff; }
    .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Hypothesis sections */
    .sections { padding: 32px; }
    .hypothesis-section { margin-bottom: 40px; }
    .hypothesis-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .hypothesis-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .hypothesis-header .count {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 100px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* Ad Card */
    .ad-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .ad-card:hover { border-color: #444; }

    .ad-card .preview {
      aspect-ratio: 4 / 5;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .ad-card .preview .iframe-wrap {
      position: absolute;
      inset: 0;
    }
    .ad-card .preview .iframe-wrap iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    .ad-card.edit-mode .preview .iframe-wrap iframe {
      pointer-events: auto;
    }
    .ad-card .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .ad-card .preview .placeholder {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    .format-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      color: #fff;
    }

    .ad-card .info {
      padding: 16px;
    }
    .ad-card .info h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .ad-card .info .headline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .ad-card .info .meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .ad-card .info .meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag.story { background: #1a2332; color: #60a5fa; }
    .tag.feed { background: #1a2e1a; color: #4ade80; }
    .tag.reel { background: #2e1a2e; color: #c084fc; }
    .tag.carousel { background: #2e2a1a; color: #fbbf24; }
    .tag.static { background: #1e1b2e; color: #a5b4fc; }

    /* Carousel slide navigation */
    .slide-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      z-index: 2;
    }
    .slide-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.15s;
    }
    .slide-nav-btn:hover { background: rgba(0,0,0,0.85); }
    .slide-nav-btn[disabled] { opacity: 0.3; cursor: default; }
    .slide-nav-btn.prev { left: 8px; }
    .slide-nav-btn.next { right: 8px; }

    /* Copy block */
    .ad-card .copy-block {
      border-top: 1px solid var(--border);
      padding: 16px;
    }
    .ad-card .copy-block summary {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .ad-card .copy-block .body-copy {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--text);
    }
    .ad-card .copy-block .cta {
      margin-top: 10px;
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
    }

    /* Review UI */
    .review-block {
      border-top: 1px solid var(--border);
      padding: 16px;
    }
    .review-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .review-buttons button {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
    }
    .review-buttons button:hover { opacity: 0.85; }
    .review-buttons button.btn-approve { border-color: #22c55e; color: #22c55e; }
    .review-buttons button.btn-approve.selected { background: #22c55e; color: #000; }
    .review-buttons button.btn-maybe { border-color: #eab308; color: #eab308; }
    .review-buttons button.btn-maybe.selected { background: #eab308; color: #000; }
    .review-buttons button.btn-reject { border-color: #ef4444; color: #ef4444; }
    .review-buttons button.btn-reject.selected { background: #ef4444; color: #fff; }
    .review-block textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 48px;
      display: none;
    }
    .review-block textarea.visible { display: block; }
    .review-block .submit-btn {
      margin-top: 8px;
      padding: 7px 16px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    .review-block .submit-btn.visible { display: inline-block; }
    .review-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .review-badge.badge-approved { background: rgba(34,197,94,0.15); color: #22c55e; }
    .review-badge.badge-maybe { background: rgba(234,179,8,0.15); color: #eab308; }
    .review-badge.badge-rejected { background: rgba(239,68,68,0.15); color: #ef4444; }
    .review-saved-reason {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: toastIn 0.2s ease-out;
      line-height: 1.5;
    }
    .toast.success { border-left: 3px solid #22c55e; }
    .toast.error { border-left: 3px solid #ef4444; }
    .toast a { color: var(--accent-hover); text-decoration: none; font-weight: 500; }
    .toast a:hover { text-decoration: underline; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 32px;
    }
    .empty-state h2 {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .empty-state p {
      color: var(--muted);
      font-size: 14px;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }
    /* Card actions bar */
    .card-actions {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .card-actions .spacer { flex: 1; }
    .action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--text); }
    .action-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .action-btn.exporting {
      opacity: 0.7;
      cursor: wait;
      pointer-events: none;
    }
    .action-btn.exported {
      background: rgba(34,197,94,0.9);
      border-color: #22c55e;
      color: #fff;
    }

    /* Inline editable text */
    .editable {
      cursor: text;
      border-radius: 4px;
      transition: background 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .editable:hover {
      background: rgba(99,102,241,0.08);
      box-shadow: inset 0 0 0 1px rgba(99,102,241,0.25);
    }
    .editable:focus {
      outline: none;
      background: rgba(99,102,241,0.12);
      box-shadow: inset 0 0 0 1.5px var(--accent);
    }
    .editable.saving {
      opacity: 0.5;
      pointer-events: none;
    }
    .editable.saved {
      box-shadow: inset 0 0 0 1.5px #22c55e;
      background: rgba(34,197,94,0.08);
    }
    .editable.save-error {
      box-shadow: inset 0 0 0 1.5px #ef4444;
      background: rgba(239,68,68,0.08);
    }
    .edit-hint {
      position: absolute;
      top: -20px;
      right: 0;
      font-size: 10px;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      white-space: nowrap;
    }
    .editable:hover .edit-hint,
    .editable:focus .edit-hint { opacity: 1; }

    /* Edit mode */
    .ad-card.edit-mode .preview {
      box-shadow: inset 0 0 0 3px var(--accent);
    }
    .ad-card.edit-mode .action-btn.edit-toggle {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }
    /* Focused mode: hide clutter when in Edit mode */
    .ad-card.edit-mode .card-actions .action-btn:not(.edit-toggle):not(.edit-cancel-btn),
    .ad-card.edit-mode .card-actions .unsaved-badge,
    .ad-card.edit-mode .card-actions .spacer,
    .ad-card.edit-mode .card-actions .save-creative-btn {
      display: none !important;
    }
    .ad-card.edit-mode .info,
    .ad-card.edit-mode .copy-block,
    .ad-card.edit-mode .review-block {
      display: none;
    }

    /* Reposition mode */
    .ad-card.reposition-mode .preview {
      box-shadow: inset 0 0 0 3px #f59e0b;
    }
    .ad-card.reposition-mode .preview .iframe-wrap iframe {
      pointer-events: auto;
    }
    .ad-card.reposition-mode .action-btn.reposition-toggle {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }

    /* Photo reposition mode */
    .ad-card.photo-repo-mode .preview {
      box-shadow: inset 0 0 0 3px #8b5cf6;
    }
    .ad-card.photo-repo-mode .preview .iframe-wrap iframe {
      pointer-events: auto;
    }
    .ad-card.photo-repo-mode .action-btn.photo-repo-toggle {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }

    /* Focused mode: hide clutter when in Move or Photo mode */
    .ad-card.reposition-mode .card-actions .action-btn:not(.reposition-toggle):not(.repo-cancel-btn),
    .ad-card.reposition-mode .card-actions .unsaved-badge,
    .ad-card.reposition-mode .card-actions .spacer,
    .ad-card.reposition-mode .card-actions .save-creative-btn {
      display: none !important;
    }
    .ad-card.reposition-mode .info,
    .ad-card.reposition-mode .copy-block,
    .ad-card.reposition-mode .review-block {
      display: none;
    }
    .ad-card.photo-repo-mode .card-actions .action-btn:not(.photo-repo-toggle):not(.photo-cancel-btn),
    .ad-card.photo-repo-mode .card-actions .unsaved-badge,
    .ad-card.photo-repo-mode .card-actions .spacer,
    .ad-card.photo-repo-mode .card-actions .save-creative-btn {
      display: none !important;
    }
    .ad-card.photo-repo-mode .info,
    .ad-card.photo-repo-mode .copy-block,
    .ad-card.photo-repo-mode .review-block {
      display: none;
    }

    /* Unsaved changes indicator */
    .ad-card.has-unsaved {
      border-color: #f59e0b;
    }
    .ad-card .unsaved-badge {
      display: none;
      font-size: 10px;
      font-weight: 600;
      color: #f59e0b;
      padding: 2px 8px;
      border: 1px solid #f59e0b;
      border-radius: 100px;
      align-items: center;
      gap: 4px;
      margin-left: 4px;
    }
    .ad-card.has-unsaved .unsaved-badge { display: inline-flex; }

    /* Delete button in action bar */
    .card-actions .action-btn[title="Delete this ad"]:hover {
      color: #ef4444;
      border-color: #ef4444;
      background: rgba(239,68,68,0.08);
    }

    /* Confirm dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .confirm-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .confirm-dialog h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .confirm-dialog p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .confirm-dialog .file-list {
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-family: 'SF Mono', Monaco, monospace;
      line-height: 1.8;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .confirm-actions button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .confirm-cancel {
      background: var(--surface);
      color: var(--text);
    }
    .confirm-cancel:hover { border-color: var(--accent); }
    .confirm-delete {
      background: #ef4444;
      border-color: #ef4444;
      color: #fff;
    }
    .confirm-delete:hover { background: #dc2626; }

    /* ── Instagram Grid View ── */
    .view-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-right: 12px;
    }
    .view-toggle button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-toggle button:hover { color: var(--text); }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    .ig-grid-container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 32px;
    }
    .ig-grid-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .ig-grid-header h2 { font-size: 16px; font-weight: 600; }
    .ig-grid-header .grid-stats { font-size: 13px; color: var(--muted); }

    .ig-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      background: var(--bg);
    }

    .ig-grid-cell {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #222;
      cursor: pointer;
    }

    .ig-grid-cell .grid-iframe-wrap {
      position: absolute;
      width: 100%;
      height: 125%;
      top: -12.5%;
      left: 0;
      pointer-events: none;
    }
    .ig-grid-cell .grid-iframe-wrap iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .ig-grid-cell .cell-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .ig-grid-cell:hover .cell-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .ig-grid-cell .carousel-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 3;
      color: #fff;
      pointer-events: none;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }

    .ig-grid-cell .cell-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 3;
    }
    .ig-grid-cell:hover .cell-name { opacity: 1; }

    .ig-grid-cell.dragging {
      opacity: 0.4;
      outline: 2px dashed var(--accent);
    }
    .ig-grid-cell.drag-over {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .ig-unapproved-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .ig-unapproved-section h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .ig-unapproved-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .ig-unapproved-grid .ig-grid-cell {
      border-radius: 8px;
      border: 1px solid var(--border);
      opacity: 0.6;
    }
    .ig-unapproved-grid .ig-grid-cell:hover {
      opacity: 1;
      border-color: var(--accent);
    }

    /* Grid preview overlay */
    .grid-preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease-out;
    }
    .grid-preview-panel {
      display: flex;
      gap: 0;
      max-width: 1100px;
      width: 95%;
      max-height: 90vh;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .grid-preview-creative {
      flex: 0 0 480px;
      aspect-ratio: 4 / 5;
      background: #222;
      position: relative;
      overflow: hidden;
    }
    .grid-preview-creative .iframe-wrap {
      position: absolute;
      inset: 0;
    }
    .grid-preview-creative .iframe-wrap iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    .grid-preview-details {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .grid-preview-details h2 { font-size: 18px; font-weight: 600; }
    .grid-preview-details .caption {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .grid-preview-details .hashtags {
      font-size: 12px;
      color: var(--accent);
    }
    .grid-preview-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 10001;
    }
    .grid-preview-close:hover { background: rgba(255,255,255,0.2); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
  <header>
    <h1>Tutero Ads <span>/ Australia Paid Social</span></h1>
    <span class="badge">LOCAL ONLY</span>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="ads">Ads</button>
    <button class="mode-tab" data-mode="social">Social</button>
  </div>

  <div class="toolbar" id="toolbar">
    <!-- Filter buttons injected by renderToolbar() based on current mode -->
  </div>

  <div class="sections" id="ad-sections">
    <!-- Hypothesis groups are injected by JS from ads.json -->
  </div>

  <script>
    var ADS = [];
    var SOCIAL = [];
    var DECISIONS = {};
    var CURRENT_MODE = 'ads';
    var SOCIAL_VIEW = 'cards'; // 'cards' | 'grid'

    var TOOLBAR_FILTERS = {
      ads: [
        { key: 'all', label: 'All' },
        { key: 'story', label: 'Story' },
        { key: 'feed', label: 'Feed' },
        { key: 'reel', label: 'Reel' },
        { key: 'carousel', label: 'Carousel' }
      ],
      social: [
        { key: 'all', label: 'All' },
        { key: 'carousel', label: 'Carousel' },
        { key: 'static', label: 'Static' }
      ]
    };

    function getActiveDataset() {
      return CURRENT_MODE === 'social' ? SOCIAL : ADS;
    }

    function renderToolbar() {
      var toolbar = document.getElementById('toolbar');
      var filters = TOOLBAR_FILTERS[CURRENT_MODE] || TOOLBAR_FILTERS.ads;

      var viewToggle = '';
      if (CURRENT_MODE === 'social') {
        viewToggle = '<div class="view-toggle">' +
          '<button data-view="cards"' + (SOCIAL_VIEW === 'cards' ? ' class="active"' : '') + '>Cards</button>' +
          '<button data-view="grid"' + (SOCIAL_VIEW === 'grid' ? ' class="active"' : '') + '>Grid</button>' +
        '</div>';
      }

      if (CURRENT_MODE === 'social' && SOCIAL_VIEW === 'grid') {
        var approvedCount = SOCIAL.filter(function(s) { return s.grid_approved; }).length;
        toolbar.innerHTML = viewToggle +
          '<button onclick="gridSelectAll(true)">Approve All</button>' +
          '<button onclick="gridSelectAll(false)">Remove All</button>' +
          '<span style="flex:1"></span>' +
          '<span style="font-size:13px;color:var(--muted)">' + approvedCount + ' / ' + SOCIAL.length + ' on grid</span>';
      } else {
        var btns = filters.map(function(f, i) {
          return '<button' + (i === 0 ? ' class="active"' : '') + ' data-filter="' + f.key + '">' + f.label + '</button>';
        }).join('');
        toolbar.innerHTML = viewToggle + btns +
          '<span style="flex:1"></span>' +
          '<button onclick="bulkExportPng()" style="margin-left:auto">Export All PNG</button>';
      }
    }

    // Load ads + social + decisions in parallel
    Promise.all([
      fetch('/ads/ads.json').then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; }),
      fetch('/ads/social.json').then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; }),
      fetch('/api/ad-feedback').then(function(r) { return r.ok ? r.json() : { decisions: {} }; }).catch(function() { return { decisions: {} }; })
    ]).then(function(results) {
      ADS = results[0];
      SOCIAL = results[1];
      DECISIONS = results[2].decisions || {};
      renderToolbar();
      render('all');
    });

    function render(filter) {
      var container = document.getElementById('ad-sections');
      var dataset = getActiveDataset();
      var filtered = filter === 'all' ? dataset : dataset.filter(function(a) {
        return (a.format || '').toLowerCase() === filter;
      });

      if (filtered.length === 0) {
        var fileLabel = CURRENT_MODE === 'social' ? 'ads/social.json' : 'ads/ads.json';
        var emptyHeading = CURRENT_MODE === 'social' ? 'No social posts yet' : 'No ads yet';
        container.innerHTML = '<div class="empty-state">' +
          '<h2>' + emptyHeading + '</h2>' +
          '<p>Add entries to <code>' + fileLabel + '</code> and they\'ll appear here. Each entry needs a name, format, headline, and either a creative_file (Static) or slides[] (Carousel).</p>' +
          '</div>';
        return;
      }

      // Group by hypothesis
      var groups = {};
      var groupOrder = [];
      filtered.forEach(function(ad) {
        var key = ad.hypothesis || 'Uncategorised';
        if (!groups[key]) {
          groups[key] = [];
          groupOrder.push(key);
        }
        groups[key].push(ad);
      });

      container.innerHTML = groupOrder.map(function(hypothesis) {
        var ads = groups[hypothesis];
        var cards = ads.map(function(ad) {
          var formatClass = (ad.format || '').toLowerCase();
          var isCarousel = formatClass === 'carousel' && Array.isArray(ad.slides) && ad.slides.length > 0;
          var creativePath = isCarousel ? ad.slides[0] : ad.creative_file;
          var slidesAttr = isCarousel ? ' data-slides=\'' + JSON.stringify(ad.slides).replace(/'/g, '&#39;') + '\' data-slide-index="0"' : '';

          var previewHtml;
          if (creativePath) {
            previewHtml = '<div class="iframe-wrap"><iframe src="' + creativePath + '" onload="scaleIframe(this)"></iframe></div>';
            if (isCarousel) {
              previewHtml +=
                '<span class="slide-badge">1/' + ad.slides.length + '</span>' +
                '<button class="slide-nav-btn prev" onclick="carouselNav(this, -1)"' + (ad.slides.length <= 1 ? ' disabled' : '') + '>‹</button>' +
                '<button class="slide-nav-btn next" onclick="carouselNav(this, 1)"' + (ad.slides.length <= 1 ? ' disabled' : '') + '>›</button>';
            }
          } else if (ad.image) {
            previewHtml = '<img src="' + ad.image + '" alt="' + ad.name + '">';
          } else {
            previewHtml = '<div class="placeholder">No image yet</div>';
          }

          var escapedName = ad.name.replace(/"/g, '&quot;');
          var hasCreative = !!creativePath;

          // Action bar buttons (below preview)
          var editToggleBtn = hasCreative ?
            '<button class="action-btn edit-toggle" data-creative="' + creativePath + '" onclick="toggleEditMode(this)">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
              ' Edit</button>' : '';

          var repositionBtn = hasCreative ?
            '<button class="action-btn reposition-toggle" data-creative="' + creativePath + '" onclick="toggleRepositionMode(this)">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>' +
              ' Move</button>' : '';

          var resizeBtn = hasCreative ?
            '<button class="action-btn resize-toggle" data-creative="' + creativePath + '" onclick="toggleResizeMode(this)">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>' +
              ' Resize</button>' : '';

          var photoRepoBtn = hasCreative ?
            '<button class="action-btn photo-repo-toggle" data-creative="' + creativePath + '" onclick="togglePhotoReposition(this)">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' +
              ' Photo</button>' : '';

          var toggleLogoBtn = hasCreative ?
            '<button class="action-btn" onclick="toggleCreativeElement(this, \'logo\')" title="Toggle logo visibility">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M3 9h6"/></svg>' +
              ' Logo</button>' : '';

          var toggleUrlBtn = hasCreative ?
            '<button class="action-btn" onclick="toggleCreativeElement(this, \'url\')" title="Toggle URL visibility">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>' +
              ' URL</button>' : '';

          var toggleEyebrowBtn = hasCreative ?
            '<button class="action-btn" onclick="toggleCreativeElement(this, \'eyebrow\')" title="Toggle pill visibility">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="8" rx="4"/><line x1="7" y1="12" x2="17" y2="12"/></svg>' +
              ' Pill</button>' : '';

          var exportSvgBtn = '<button class="action-btn" onclick="exportAsSvg(this)" data-name="' + escapedName + '" title="Copy SVG to clipboard">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
              ' SVG</button>';

          var exportPngBtn = '<button class="action-btn" onclick="exportAsPng(this)" data-name="' + escapedName + '" data-image="' + (ad.image || '') + '" title="Download PNG">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
              ' PNG</button>';

          var exportZipBtn = isCarousel ?
            '<button class="action-btn" onclick="exportAsZip(this)" data-name="' + escapedName + '" title="Download all slides as ZIP">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
              ' ZIP</button>' : '';

          var deleteBtnHtml = '<button class="action-btn" data-name="' + escapedName + '" onclick="confirmDeleteAd(this)" title="Delete this ad" style="color:#ef4444;border-color:transparent">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
              '</button>';

          return '<div class="ad-card" data-format="' + formatClass + '" data-source="' + CURRENT_MODE + '" data-ad-name="' + ad.name.replace(/"/g, '&quot;') + '"' + slidesAttr + '>' +
            '<div class="preview">' +
              previewHtml +
              '<span class="format-badge">' + ad.format + '</span>' +
            '</div>' +
            '<div class="card-actions">' +
              (hasCreative ? '<button class="action-btn open-btn" onclick="window.open(\'' + creativePath + '\', \'_blank\')">' +
                '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
                ' Open</button>' : '') +
              editToggleBtn +
              repositionBtn +
              resizeBtn +
              photoRepoBtn +
              toggleLogoBtn +
              toggleUrlBtn +
              toggleEyebrowBtn +
              '<span class="unsaved-badge">Unsaved</span>' +
              '<span class="spacer"></span>' +
              (hasCreative ? '<button class="action-btn save-creative-btn" onclick="saveCreativeState(this)" style="display:none;background:#22c55e;border-color:#22c55e;color:#fff"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Save</button>' : '') +
              exportSvgBtn +
              exportPngBtn +
              exportZipBtn +
              deleteBtnHtml +
            '</div>' +
            '<div class="info">' +
              '<h3 class="editable" contenteditable="true" data-field="name" spellcheck="false">' + ad.name + '</h3>' +
              '<div class="headline editable" contenteditable="true" data-field="headline" spellcheck="false">' + (ad.headline || '') + '</div>' +
              '<div class="meta">' +
                '<span class="tag ' + formatClass + '">' + ad.format + '</span>' +
                (ad.audience ? '<span>Audience: ' + ad.audience + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<div class="copy-block">' +
              '<details><summary>View primary text</summary>' +
                '<div class="body-copy editable" contenteditable="true" data-field="' + (CURRENT_MODE === 'social' ? 'caption' : 'body') + '" spellcheck="false">' + (CURRENT_MODE === 'social' ? (ad.caption || '') : (ad.body || '')) + '</div>' +
                (CURRENT_MODE === 'social'
                  ? (ad.cta ? '<span class="cta editable" contenteditable="true" data-field="cta" spellcheck="false" style="cursor:text">' + ad.cta + '</span>' : '')
                  : (ad.cta_label ? '<span class="cta editable" contenteditable="true" data-field="cta_label" spellcheck="false" style="cursor:text">' + ad.cta_label + '</span>' : '')
                ) +
              '</details>' +
            '</div>' +
            buildReviewBlock(ad) +
          '</div>';
        }).join('');

        return '<div class="hypothesis-section">' +
          '<div class="hypothesis-header">' +
            '<h2>' + hypothesis + '</h2>' +
            '<span class="count">' + ads.length + ' ad' + (ads.length !== 1 ? 's' : '') + '</span>' +
          '</div>' +
          '<div class="grid">' + cards + '</div>' +
        '</div>';
      }).join('');
    }

    function buildReviewBlock(ad) {
      var existing = DECISIONS[ad.name];
      if (existing) {
        var badgeClass = 'badge-' + existing.decision;
        var label = existing.decision.charAt(0).toUpperCase() + existing.decision.slice(1);
        return '<div class="review-block">' +
          '<span class="review-badge ' + badgeClass + '">' + label + '</span>' +
          (existing.reason ? '<div class="review-saved-reason">' + existing.reason + '</div>' : '') +
        '</div>';
      }

      var safeId = ad.name.replace(/[^a-zA-Z0-9]/g, '-');
      return '<div class="review-block" id="review-' + safeId + '">' +
        '<div class="review-buttons">' +
          '<button class="btn-approve" onclick="selectDecision(\'' + safeId + '\', \'approved\', this)">Approve</button>' +
          '<button class="btn-maybe" onclick="selectDecision(\'' + safeId + '\', \'maybe\', this)">Maybe</button>' +
          '<button class="btn-reject" onclick="selectDecision(\'' + safeId + '\', \'rejected\', this)">Reject</button>' +
        '</div>' +
        '<textarea id="reason-' + safeId + '" placeholder="Reason (required for reject)"></textarea>' +
        '<button class="submit-btn" id="submit-' + safeId + '" onclick="submitReview(\'' + safeId + '\')">Submit</button>' +
        '<input type="hidden" id="decision-' + safeId + '" value="">' +
        '<input type="hidden" id="adname-' + safeId + '" value="' + ad.name.replace(/"/g, '&quot;') + '">' +
        '<input type="hidden" id="hyp-' + safeId + '" value="' + (ad.hypothesis || '').replace(/"/g, '&quot;') + '">' +
      '</div>';
    }

    function selectDecision(safeId, decision, btn) {
      var block = document.getElementById('review-' + safeId);
      block.querySelectorAll('.review-buttons button').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      document.getElementById('decision-' + safeId).value = decision;
      document.getElementById('reason-' + safeId).classList.add('visible');
      document.getElementById('submit-' + safeId).classList.add('visible');
    }

    function submitReview(safeId) {
      var decision = document.getElementById('decision-' + safeId).value;
      var reason = document.getElementById('reason-' + safeId).value.trim();
      var adName = document.getElementById('adname-' + safeId).value;
      var hypothesis = document.getElementById('hyp-' + safeId).value;

      if (!decision) return;
      if (decision === 'rejected' && !reason) {
        document.getElementById('reason-' + safeId).style.borderColor = '#ef4444';
        return;
      }

      var submitBtn = document.getElementById('submit-' + safeId);
      submitBtn.textContent = 'Saving...';
      submitBtn.disabled = true;

      fetch('/api/ad-feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ad_name: adName, hypothesis: hypothesis, decision: decision, reason: reason })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          DECISIONS[adName] = { decision: decision, reason: reason, hypothesis: hypothesis };
          var block = document.getElementById('review-' + safeId);
          var badgeClass = 'badge-' + decision;
          var label = decision.charAt(0).toUpperCase() + decision.slice(1);
          block.innerHTML = '<span class="review-badge ' + badgeClass + '">' + label + '</span>' +
            (reason ? '<div class="review-saved-reason">' + reason + '</div>' : '');
        }
      })
      .catch(function() {
        submitBtn.textContent = 'Error — retry';
        submitBtn.disabled = false;
      });
    }

    function scaleIframe(iframe) {
      var wrap = iframe.parentElement;
      var scale = wrap.offsetWidth / 1080;
      iframe.style.transform = 'scale(' + scale + ')';
    }

    // Re-scale on window resize
    window.addEventListener('resize', function() {
      document.querySelectorAll('.iframe-wrap iframe').forEach(function(iframe) {
        scaleIframe(iframe);
      });
      document.querySelectorAll('.ig-grid-cell .grid-iframe-wrap iframe').forEach(function(iframe) {
        scaleGridIframe(iframe);
      });
    });

    // Filter buttons
    document.querySelector('.toolbar').addEventListener('click', function(e) {
      // View toggle (Cards / Grid within Social)
      var viewBtn = e.target.closest('[data-view]');
      if (viewBtn) {
        var view = viewBtn.dataset.view;
        if (view === SOCIAL_VIEW) return;
        SOCIAL_VIEW = view;
        renderToolbar();
        if (SOCIAL_VIEW === 'grid') {
          renderGridView();
        } else {
          render('all');
        }
        return;
      }

      if (e.target.tagName !== 'BUTTON') return;
      if (!e.target.dataset.filter) return; // skip "Export All PNG" etc.
      document.querySelectorAll('.toolbar button[data-filter]').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      render(e.target.dataset.filter);
    });

    // Mode tabs (Ads / Social)
    document.querySelector('.mode-tabs').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      var mode = e.target.dataset.mode;
      if (!mode || mode === CURRENT_MODE) return;
      CURRENT_MODE = mode;
      SOCIAL_VIEW = 'cards';
      document.querySelectorAll('.mode-tab').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      renderToolbar();
      render('all');
    });

    // ── Instagram Grid View ──

    function scaleGridIframe(iframe) {
      var wrap = iframe.parentElement;
      if (!wrap) return;
      var scale = wrap.offsetWidth / 1080;
      iframe.style.transform = 'scale(' + scale + ')';
    }

    function renderGridView() {
      var container = document.getElementById('ad-sections');
      var approved = SOCIAL.filter(function(s) { return s.grid_approved; })
        .sort(function(a, b) { return (a.grid_order || 0) - (b.grid_order || 0); });
      var unapproved = SOCIAL.filter(function(s) { return !s.grid_approved; });

      var html = '<div class="ig-grid-container">';
      html += '<div class="ig-grid-header">' +
        '<h2>Instagram Grid Preview</h2>' +
        '<span class="grid-stats">' + approved.length + ' posts on grid</span>' +
      '</div>';

      if (approved.length > 0) {
        html += '<div class="ig-grid" id="ig-grid-sortable">';
        approved.forEach(function(post, i) {
          html += buildGridCell(post, i, true);
        });
        html += '</div>';
      } else {
        html += '<div class="empty-state" style="padding:48px 0">' +
          '<h2>No posts on the grid yet</h2>' +
          '<p>Approve posts below to add them to your Instagram grid wall.</p>' +
        '</div>';
      }

      if (unapproved.length > 0) {
        html += '<div class="ig-unapproved-section">' +
          '<h3>Available Posts (' + unapproved.length + ')</h3>' +
          '<div class="ig-unapproved-grid">';
        unapproved.forEach(function(post, i) {
          html += buildGridCell(post, i, false);
        });
        html += '</div></div>';
      }

      html += '</div>';
      container.innerHTML = html;

      requestAnimationFrame(function() {
        container.querySelectorAll('.ig-grid-cell .grid-iframe-wrap iframe').forEach(function(iframe) {
          scaleGridIframe(iframe);
        });
        initGridDragDrop();
      });
    }

    function buildGridCell(post, index, isApproved) {
      var isCarousel = post.format === 'Carousel' && Array.isArray(post.slides) && post.slides.length > 0;
      var creativePath = isCarousel ? post.slides[0] : post.creative_file;
      var escapedName = post.name.replace(/"/g, '&quot;');

      var previewHtml = '';
      if (creativePath) {
        previewHtml = '<div class="grid-iframe-wrap">' +
          '<iframe src="' + creativePath + '" loading="lazy" onload="scaleGridIframe(this)"></iframe>' +
        '</div>';
      } else {
        previewHtml = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">No preview</div>';
      }

      var carouselIcon = isCarousel ?
        '<div class="carousel-indicator">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="7" height="18" rx="1.5"/><rect x="11" y="3" width="7" height="18" rx="1.5" opacity="0.5"/><rect x="20" y="3" width="2" height="18" rx="1" opacity="0.3"/></svg>' +
        '</div>' : '';

      var approveBtn = isApproved ?
        '<button class="grid-approve-btn" data-approve="false" ' +
          'style="background:rgba(239,68,68,0.9);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">' +
          'Remove</button>' :
        '<button class="grid-approve-btn" data-approve="true" ' +
          'style="background:rgba(34,197,94,0.9);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">' +
          'Add to Grid</button>';

      return '<div class="ig-grid-cell" data-post-name="' + escapedName + '"' +
        (isApproved ? ' draggable="true"' : '') + '>' +
        previewHtml +
        carouselIcon +
        '<div class="cell-overlay">' + approveBtn + '</div>' +
        '<div class="cell-name">' + post.name + '</div>' +
      '</div>';
    }

    // Delegated click handler for all grid interactions
    document.getElementById('ad-sections').addEventListener('click', function(e) {
      // Handle approve/remove button clicks
      var approveBtn = e.target.closest('.grid-approve-btn');
      if (approveBtn) {
        e.stopPropagation();
        var cell = approveBtn.closest('.ig-grid-cell');
        if (!cell) return;
        var postName = cell.dataset.postName;
        var approve = approveBtn.dataset.approve === 'true';
        toggleGridApproval(postName, approve);
        return;
      }

      // Handle cell clicks (open preview)
      var cell = e.target.closest('.ig-grid-cell');
      if (cell && SOCIAL_VIEW === 'grid') {
        openGridPreview(cell.dataset.postName);
      }
    });

    function toggleGridApproval(postName, approve) {
      var post = SOCIAL.find(function(s) { return s.name === postName; });
      if (!post) {
        showToast('Post not found: ' + postName, 'error');
        return;
      }

      var newOrder = 0;
      if (approve) {
        var maxOrder = SOCIAL.reduce(function(max, s) {
          return s.grid_approved ? Math.max(max, s.grid_order || 0) : max;
        }, -1);
        newOrder = maxOrder + 1;
      }

      var oldApproved = post.grid_approved;
      var oldOrder = post.grid_order;
      post.grid_approved = approve;
      post.grid_order = approve ? newOrder : 0;

      // Immediately re-render for snappy UI
      renderToolbar();
      renderGridView();

      // Persist: first grid_approved, then grid_order
      fetch('/api/ad-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ad_name: postName, field: 'grid_approved', value: approve, source: 'social' })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) throw new Error(data.error || 'Save failed');
        return fetch('/api/ad-edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ad_name: postName, field: 'grid_order', value: post.grid_order, source: 'social' })
        });
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) throw new Error(data.error || 'Save failed');
        showToast((approve ? 'Added' : 'Removed') + ' <strong>' + postName + '</strong> ' + (approve ? 'to' : 'from') + ' grid', 'success');
      })
      .catch(function(err) {
        post.grid_approved = oldApproved;
        post.grid_order = oldOrder;
        showToast('Failed to update: ' + err.message, 'error');
        renderToolbar();
        renderGridView();
      });
    }

    function gridSelectAll(approve) {
      SOCIAL.forEach(function(post, i) {
        post.grid_approved = approve;
        post.grid_order = approve ? i : 0;
      });

      // Optimistic re-render
      renderToolbar();
      renderGridView();

      var promises = SOCIAL.map(function(post) {
        return fetch('/api/ad-edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ad_name: post.name, field: 'grid_approved', value: approve, source: 'social' })
        });
      });

      Promise.all(promises)
      .then(function() {
        if (approve) {
          return fetch('/api/ad-edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              bulk_reorder: true,
              source: 'social',
              order: SOCIAL.map(function(p, i) { return { name: p.name, grid_order: i }; })
            })
          });
        }
      })
      .then(function() {
        showToast(approve ? 'All posts added to grid' : 'Grid cleared', 'success');
      })
      .catch(function() {
        showToast('Some updates failed — refresh to retry', 'error');
      });
    }

    function initGridDragDrop() {
      var grid = document.getElementById('ig-grid-sortable');
      if (!grid) return;

      var draggedCell = null;

      grid.addEventListener('dragstart', function(e) {
        var cell = e.target.closest('.ig-grid-cell');
        if (!cell) return;
        draggedCell = cell;
        cell.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', cell.dataset.postName);
      });

      grid.addEventListener('dragend', function() {
        if (draggedCell) {
          draggedCell.classList.remove('dragging');
          draggedCell = null;
        }
        grid.querySelectorAll('.ig-grid-cell').forEach(function(c) {
          c.classList.remove('drag-over');
        });
      });

      grid.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        var cell = e.target.closest('.ig-grid-cell');
        if (cell && cell !== draggedCell) {
          grid.querySelectorAll('.ig-grid-cell').forEach(function(c) {
            c.classList.remove('drag-over');
          });
          cell.classList.add('drag-over');
        }
      });

      grid.addEventListener('drop', function(e) {
        e.preventDefault();
        var targetCell = e.target.closest('.ig-grid-cell');
        if (!targetCell || !draggedCell || targetCell === draggedCell) return;

        var draggedName = draggedCell.dataset.postName;
        var targetName = targetCell.dataset.postName;

        var approved = SOCIAL.filter(function(s) { return s.grid_approved; })
          .sort(function(a, b) { return (a.grid_order || 0) - (b.grid_order || 0); });

        var draggedIdx = approved.findIndex(function(s) { return s.name === draggedName; });
        var targetIdx = approved.findIndex(function(s) { return s.name === targetName; });
        if (draggedIdx === -1 || targetIdx === -1) return;

        var item = approved.splice(draggedIdx, 1)[0];
        approved.splice(targetIdx, 0, item);

        var order = [];
        approved.forEach(function(post, i) {
          post.grid_order = i;
          order.push({ name: post.name, grid_order: i });
        });

        fetch('/api/ad-edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bulk_reorder: true, source: 'social', order: order })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.success) throw new Error('Reorder failed');
          showToast('Grid order updated', 'success');
          renderGridView();
        })
        .catch(function(err) {
          showToast('Failed to save order: ' + err.message, 'error');
          renderGridView();
        });
      });
    }

    function openGridPreview(postName) {
      var post = SOCIAL.find(function(s) { return s.name === postName; });
      if (!post) return;

      var isCarousel = post.format === 'Carousel' && Array.isArray(post.slides) && post.slides.length > 0;
      var creativePath = isCarousel ? post.slides[0] : post.creative_file;

      var slideNav = '';
      if (isCarousel) {
        slideNav = '<div style="display:flex;align-items:center;gap:8px">' +

          '<span id="grid-preview-slide-badge" style="font-size:12px;color:var(--muted)">1/' + post.slides.length + '</span>' +
          '<button class="grid-preview-next" style="background:var(--surface);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">&#8250;</button>' +
        '</div>';
      }

      var approveLabel = post.grid_approved ? 'Remove from Grid' : 'Add to Grid';
      var approveBg = post.grid_approved ? '#ef4444' : '#22c55e';

        '<span style="font-size:12px;color:var(--muted)">Position: ' + ((post.grid_order || 0) + 1) + ' of ' + SOCIAL.filter(function(s) { return s.grid_approved; }).length + '</span>' : '';

      var overlay = document.createElement('div');
      overlay.className = 'grid-preview-overlay';
      overlay.innerHTML =
        '<button class="grid-preview-close">&times;</button>' +
        '<div class="grid-preview-panel">' +
          '<div class="grid-preview-creative" data-slides="' + (isCarousel ? JSON.stringify(post.slides).replace(/"/g, '&quot;') : '[]') + '" data-slide-index="0">' +
            (creativePath ?
              '<div class="iframe-wrap"><iframe src="' + creativePath + '" onload="scaleIframe(this)"></iframe></div>' :
              '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">No preview</div>'
            ) +
          '</div>' +
          '<div class="grid-preview-details">' +
            '<h2>' + post.name + '</h2>' +
            '<span class="tag ' + post.format.toLowerCase() + '">' + post.format + '</span>' +
            '<div style="font-size:15px;font-weight:600;color:var(--text)">' + (post.headline || '') + '</div>' +
            slideNav +
            '<div class="caption">' + (post.caption || '') + '</div>' +
            '<div class="hashtags">' + (post.hashtags || []).join(' ') + '</div>' +
            '<div style="margin-top:auto;padding-top:16px;display:flex;gap:8px;align-items:center">' +
              '<button class="grid-preview-approve" style="background:' + approveBg + ';border:1px solid ' + approveBg + ';color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">' + approveLabel + '</button>' +
              positionInfo +
            '</div>' +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);

      // Close button
      overlay.querySelector('.grid-preview-close').addEventListener('click', function() {
        overlay.remove();
      });

      // Background click to close
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
      });

      // Escape key to close
      var escHandler = function(e) {
        if (e.key === 'Escape') {
          overlay.remove();
          document.removeEventListener('keydown', escHandler);
        }
      };
      document.addEventListener('keydown', escHandler);

      // Approve/remove button
      overlay.querySelector('.grid-preview-approve').addEventListener('click', function() {
        var shouldApprove = !post.grid_approved;
        overlay.remove();
        toggleGridApproval(postName, shouldApprove);
      });

      // Carousel navigation
      var prevBtn = overlay.querySelector('.grid-preview-prev');
      var nextBtn = overlay.querySelector('.grid-preview-next');
      if (prevBtn) prevBtn.addEventListener('click', function() { gridPreviewNav(-1); });
      if (nextBtn) nextBtn.addEventListener('click', function() { gridPreviewNav(1); });
    }

    function gridPreviewNav(delta) {
      var panel = document.querySelector('.grid-preview-creative');
      if (!panel) return;
      var slides;
      try { slides = JSON.parse(panel.dataset.slides || '[]'); } catch(e) { slides = []; }
      if (slides.length < 2) return;

      var idx = parseInt(panel.dataset.slideIndex || '0', 10) + delta;
      if (idx < 0) idx = 0;
      if (idx > slides.length - 1) idx = slides.length - 1;
      panel.dataset.slideIndex = idx;

      var iframe = panel.querySelector('.iframe-wrap iframe');
      if (iframe) iframe.src = slides[idx];

      var badge = document.getElementById('grid-preview-slide-badge');
      if (badge) badge.textContent = (idx + 1) + '/' + slides.length;
    }

    // ── Carousel slide navigation ──
    function carouselNav(btn, delta) {
      var card = btn.closest('.ad-card');
      if (!card) return;
      var slides;
      try { slides = JSON.parse(card.dataset.slides || '[]'); } catch (e) { slides = []; }
      if (slides.length < 2) return;

      var idx = parseInt(card.dataset.slideIndex || '0', 10) + delta;
      if (idx < 0) idx = 0;
      if (idx > slides.length - 1) idx = slides.length - 1;
      card.dataset.slideIndex = idx;

      var newPath = slides[idx];
      var iframe = card.querySelector('.iframe-wrap iframe');
      if (iframe) {
        iframe.src = newPath;
      }
      var badge = card.querySelector('.slide-badge');
      if (badge) badge.textContent = (idx + 1) + '/' + slides.length;

      // Re-point the slide-aware action buttons at the visible slide
      card.querySelectorAll('.edit-toggle, .reposition-toggle, .resize-toggle, .photo-repo-toggle').forEach(function(b) {
        b.dataset.creative = newPath;
      });
      var openBtn = card.querySelector('.open-btn');
      if (openBtn) openBtn.setAttribute('onclick', "window.open('" + newPath + "', '_blank')");

      // Disabled state for prev/next at edges
      var prev = card.querySelector('.slide-nav-btn.prev');
      var next = card.querySelector('.slide-nav-btn.next');
      if (prev) prev.disabled = (idx === 0);
      if (next) next.disabled = (idx === slides.length - 1);
    }

    // ── Inline Text Editing ──

    // Track original values so we only save actual changes
    document.addEventListener('focusin', function(e) {
      var el = e.target;
      if (!el.classList || !el.classList.contains('editable')) return;
      el.dataset.original = el.innerText || el.textContent;
    });

    // Save on blur
    document.addEventListener('focusout', function(e) {
      var el = e.target;
      if (!el.classList || !el.classList.contains('editable')) return;
      saveEdit(el);
    });

    // Save on Enter (except body which allows newlines), Escape to cancel
    document.addEventListener('keydown', function(e) {
      var el = e.target;
      if (!el.classList || !el.classList.contains('editable')) return;

      if (e.key === 'Escape') {
        el.textContent = el.dataset.original || '';
        el.blur();
        e.preventDefault();
        return;
      }

      // Enter inserts a newline in all fields (save via blur / save button)
      if (e.key === 'Enter') {
        e.preventDefault();
        document.execCommand('insertLineBreak');
      }
    });

    // Prevent pasting rich text — plain text only
    document.addEventListener('paste', function(e) {
      var el = e.target;
      if (!el.classList || !el.classList.contains('editable')) return;
      e.preventDefault();
      var text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    function saveEdit(el) {
      var newValue = (el.innerText || el.textContent).trim();
      var original = (el.dataset.original || '').trim();

      // No change — skip
      if (newValue === original) return;

      var card = el.closest('.ad-card');
      var adName = card.dataset.adName;
      var field = el.dataset.field;
      var source = card.dataset.source || CURRENT_MODE;

      el.classList.add('saving');

      fetch('/api/ad-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ad_name: adName, field: field, value: newValue, source: source })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        el.classList.remove('saving');
        if (data.success) {
          // Update the in-memory dataset for the card's mode
          var dataset = source === 'social' ? SOCIAL : ADS;
          var ad = dataset.find(function(a) { return a.name === adName; });
          if (ad) {
            ad[field] = newValue;
            // If name changed, update the card's data attribute
            if (field === 'name') {
              card.dataset.adName = newValue;
              // Also update any buttons that reference the old name
              card.querySelectorAll('[data-name]').forEach(function(btn) {
                if (btn.dataset.name === adName) btn.dataset.name = newValue;
              });
            }
          }

          el.classList.add('saved');
          setTimeout(function() { el.classList.remove('saved'); }, 1500);
          showToast('Saved: <strong>' + field + '</strong> updated', 'success');
        } else {
          throw new Error(data.error || 'Save failed');
        }
      })
      .catch(function(err) {
        el.classList.remove('saving');
        el.classList.add('save-error');
        setTimeout(function() { el.classList.remove('save-error'); }, 3000);
        showToast('Failed to save: ' + err.message, 'error');
        // Revert to original
        el.textContent = original;
      });
    }

    // ── Creative Edit Mode ──

    // Find all leaf text elements inside the creative's .ad container (fallback to body)
    function findTextElements(doc) {
      var ad = doc.querySelector('.ad') || doc.body;
      if (!ad) return [];
      var results = [];
      var dominated = new Set(); // elements whose text is fully inside a child we already picked

      function walk(el) {
        if (!el || !el.children) return;
        var dominated_by_child = false;
        for (var i = 0; i < el.children.length; i++) {
          walk(el.children[i]);
        }

        // Skip non-visible, containers, images, SVGs
        var tag = el.tagName.toUpperCase();
        if (tag === 'SVG' || tag === 'IMG' || tag === 'STYLE' || tag === 'SCRIPT' || tag === 'LINK') return;

        var cs = doc.defaultView.getComputedStyle(el);
        if (cs.display === 'none' || cs.visibility === 'hidden') return;

        // Has direct text content?
        var hasText = false;
        for (var i = 0; i < el.childNodes.length; i++) {
          if (el.childNodes[i].nodeType === 3 && el.childNodes[i].textContent.trim()) {
            hasText = true;
            break;
          }
        }
        if (!hasText) return;

        // Skip if all text children are already covered by a child element we found
        var allCovered = true;
        for (var i = 0; i < el.childNodes.length; i++) {
          var n = el.childNodes[i];
          if (n.nodeType === 3 && n.textContent.trim()) {
            allCovered = false;
            break;
          }
        }
        if (allCovered) return;

        // Skip tiny text (footers, urls) — only include meaningful text
        var rect = el.getBoundingClientRect();
        if (rect.width < 10 || rect.height < 5) return;

        results.push(el);
      }

      walk(ad);
      return results;
    }

    function toggleEditMode(btn) {
      var card = btn.closest('.ad-card');
      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) {
        showToast('Cannot access creative content', 'error');
        return;
      }

      // Exit reposition mode if active
      if (card.classList.contains('reposition-mode')) {
        var repoBtn = card.querySelector('.reposition-toggle');
        if (repoBtn) toggleRepositionMode(repoBtn);
      }
      // Exit photo reposition mode if active
      if (card.classList.contains('photo-repo-mode')) {
        var photoBtn = card.querySelector('.photo-repo-toggle');
        if (photoBtn) togglePhotoReposition(photoBtn);
      }
      // Exit resize mode if active
      if (card.classList.contains('resize-mode')) {
        var resizeBtn = card.querySelector('.resize-toggle');
        if (resizeBtn) { card._resizeCancelled = true; toggleResizeMode(resizeBtn); }
      }

      var isEditing = card.classList.toggle('edit-mode');

      if (isEditing) {
        // Enter mode — show Save + Cancel
        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Save';
        btn.style.background = '#22c55e';
        btn.style.borderColor = '#22c55e';
        btn.style.color = '#fff';

        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'action-btn edit-cancel-btn';
        cancelBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Cancel';
        cancelBtn.addEventListener('click', function() {
          card._editCancelled = true;
          toggleEditMode(btn);
        });
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);

        card._editCancelled = false;
        enableCreativeEditing(card, iframe);
      } else {
        // Exit mode — save or cancel
        var shouldSave = !card._editCancelled;

        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit';
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';

        var cancelEl = card.querySelector('.edit-cancel-btn');
        if (cancelEl) cancelEl.remove();

        disableCreativeEditing(card, iframe, shouldSave);
        delete card._editCancelled;
      }
    }

    function enableCreativeEditing(card, iframe) {
      var doc = iframe.contentDocument;
      var els = findTextElements(doc);

      // Inject editing styles if not already present
      if (!doc.getElementById('edit-mode-styles')) {
        var style = doc.createElement('style');
        style.id = 'edit-mode-styles';
        style.textContent =
          '[contenteditable] { cursor: text; border-radius: 8px; transition: box-shadow 0.15s; outline: none; }' +
          '[contenteditable]:hover { box-shadow: inset 0 0 0 3px rgba(99,102,241,0.4); }' +
          '[contenteditable]:focus { box-shadow: inset 0 0 0 3px #6366f1; }';
        doc.head.appendChild(style);
      }

      els.forEach(function(el) {
        el.setAttribute('contenteditable', 'true');
        el.setAttribute('spellcheck', 'false');
        el.dataset.original = el.textContent;

        // Enter inserts newline, Escape to revert field
        el.addEventListener('keydown', function handler(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            doc.execCommand('insertLineBreak');
          } else if (e.key === 'Escape') {
            el.textContent = el.dataset.original || '';
            el.blur();
          }
        });

        // Plain text paste
        el.addEventListener('paste', function handler(e) {
          e.preventDefault();
          var text = (e.clipboardData || window.clipboardData).getData('text/plain');
          doc.execCommand('insertText', false, text);
        });
      });
    }

    function disableCreativeEditing(card, iframe, shouldSave) {
      var doc = iframe.contentDocument;
      var els = doc.querySelectorAll('[contenteditable]');

      if (shouldSave) {
        // Check if any text actually changed
        var hasChanges = false;
        els.forEach(function(el) {
          if (el.textContent.trim() !== (el.dataset.original || '').trim()) {
            hasChanges = true;
          }
        });

        if (hasChanges) {
          var creativePath = card.querySelector('.edit-toggle').dataset.creative;
          var fullHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
          fullHtml = fullHtml.replace(/<style id="edit-mode-styles">[\s\S]*?<\/style>/, '');
          fullHtml = fullHtml.replace(/ contenteditable="true"/g, '');
          fullHtml = fullHtml.replace(/ spellcheck="false"/g, '');
          fullHtml = fullHtml.replace(/ data-original="[^"]*"/g, '');

          fetch('/api/ad-edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ creative_file: creativePath, html: fullHtml, source: (card && card.dataset && card.dataset.source) || CURRENT_MODE })
          })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.success) {
              showToast('Creative text saved', 'success');
            } else {
              throw new Error(data.error || 'Save failed');
            }
          })
          .catch(function(err) {
            showToast('Failed to save: ' + err.message, 'error');
          });
        }
      } else {
        // Cancel — revert all text to originals
        els.forEach(function(el) {
          if (el.dataset.original !== undefined) {
            el.textContent = el.dataset.original;
          }
        });
      }

      // Remove contenteditable from all elements
      els.forEach(function(el) {
        el.removeAttribute('contenteditable');
      });
    }

    // Toast

      container.appendChild(toast);
      setTimeout(function() {
        toast.style.animation = 'toastIn 0.2s ease-out reverse forwards';
        setTimeout(function() { toast.remove(); }, 200);
      }, 4500);

    // ── Reposition Mode ──

    function toggleRepositionMode(btn) {

      if (card.classList.contains('edit-mode')) {

      // Exit photo reposition mode if active
      if (card.classList.contains('photo-repo-mode')) {

      }
      // Exit resize mode if active
      if (card.classList.contains('resize-mode')) {
        var resizeBtnEl = card.querySelector('.resize-toggle');
        if (resizeBtnEl) { card._resizeCancelled = true; toggleResizeMode(resizeBtnEl); }
      }

      var isRepositioning = card.classList.toggle('reposition-mode');

      if (isRepositioning) {
        // Enter mode — show Save + Cancel
        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Save';
        btn.style.background = '#22c55e';
        btn.style.borderColor = '#22c55e';
