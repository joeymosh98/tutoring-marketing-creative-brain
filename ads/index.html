        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'action-btn repo-cancel-btn';
        cancelBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Cancel';
        cancelBtn.addEventListener('click', function() {
          card._repoCancelled = true;
          toggleRepositionMode(btn);
        });
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);

        card._repoCancelled = false;
        enableRepositioning(card, iframe);
      } else {
        // Exit mode — save or cancel
        var shouldSave = !card._repoCancelled;

        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg> Move';
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';

        var cancelEl = card.querySelector('.repo-cancel-btn');
        if (cancelEl) cancelEl.remove();

        disableRepositioning(card, iframe, shouldSave);
        delete card._repoCancelled;
      }
    }

    function findRepositionTargets(doc) {
      // Find the flex container: .ad for light layouts, .content for overlay layouts
      // Social creatives have no .ad wrapper — fall back to body > .content or body
      var container = doc.querySelector('.ad > .content') || doc.querySelector('.ad') || doc.querySelector('body > .content') || doc.body;
      if (!container) return [];

      var targets = [];
      var skipTags = { STYLE: 1, SCRIPT: 1, LINK: 1, META: 1 };
      for (var i = 0; i < container.children.length; i++) {
        var child = container.children[i];
        if (skipTags[child.tagName.toUpperCase()]) continue;
        // Skip absolutely positioned elements (overlays, bg-photo)
        var cs = doc.defaultView.getComputedStyle(child);
        if (cs.position === 'absolute' || cs.position === 'fixed') continue;
        if (cs.display === 'none') continue;
        targets.push(child);
      }
      return targets;
    }

    // --- Snap-to-grid alignment helpers ---
    var SNAP_THRESHOLD = 5;

    function clearSnapGuides(doc) {
      var c = doc.getElementById('repo-snap-guides');
      if (c) c.innerHTML = '';
    }

    function renderSnapGuides(doc, guides) {
      var c = doc.getElementById('repo-snap-guides');
      if (!c) {
        c = doc.createElement('div');
        c.id = 'repo-snap-guides';
        c.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
        doc.body.appendChild(c);
      }
      c.innerHTML = '';
      for (var i = 0; i < guides.length; i++) {
        var line = doc.createElement('div');
        line.className = 'repo-snap-line';
        if (guides[i].axis === 'x') {
          line.style.cssText = 'position:fixed;left:' + guides[i].pos + 'px;top:0;width:1px;height:100%;';
        } else {
          line.style.cssText = 'position:fixed;top:' + guides[i].pos + 'px;left:0;height:1px;width:100%;';
        }
        c.appendChild(line);
      }
    }

    function computeSnap(el, targets, newTx, newTy, doc) {
      // Current transform on el (before we apply the new one)
      var m = (el.style.transform || '').match(/translate\(\s*([-\d.]+)px\s*,\s*([-\d.]+)px\s*\)/);
      var curTx = m ? parseFloat(m[1]) : 0;
      var curTy = m ? parseFloat(m[2]) : 0;
      var rect = el.getBoundingClientRect();
      // Base position (without any translate)
      var baseL = rect.left - curTx;
      var baseT = rect.top - curTy;
      var w = rect.width;
      var h = rect.height;

      // Proposed position with newTx, newTy
      var pL = baseL + newTx, pT = baseT + newTy;
      var pR = pL + w, pB = pT + h;
      var pCX = pL + w / 2, pCY = pT + h / 2;

      // Collect reference edges from other targets and container
      var refX = [], refY = [];
      var container = doc.querySelector('.ad > .content') || doc.querySelector('.ad');
      if (container) {
        var cr = container.getBoundingClientRect();
        refX.push(cr.left, cr.left + cr.width / 2, cr.right);
        refY.push(cr.top, cr.top + cr.height / 2, cr.bottom);
      }
      for (var i = 0; i < targets.length; i++) {
        if (targets[i] === el) continue;
        var r = targets[i].getBoundingClientRect();
        refX.push(r.left, r.left + r.width / 2, r.right);
        refY.push(r.top, r.top + r.height / 2, r.bottom);
      }

      // Find best snap
      var snapTx = newTx, snapTy = newTy;
      var bestDx = SNAP_THRESHOLD + 1, bestDy = SNAP_THRESHOLD + 1;
      var propXE = [pL, pCX, pR];
      var propYE = [pT, pCY, pB];

      for (var pi = 0; pi < propXE.length; pi++) {
        for (var ri = 0; ri < refX.length; ri++) {
          var d = Math.abs(propXE[pi] - refX[ri]);
          if (d < SNAP_THRESHOLD && d < bestDx) {
            bestDx = d;
            snapTx = newTx + (refX[ri] - propXE[pi]);
          }
        }
      }
      for (var pi = 0; pi < propYE.length; pi++) {
        for (var ri = 0; ri < refY.length; ri++) {
          var d = Math.abs(propYE[pi] - refY[ri]);
          if (d < SNAP_THRESHOLD && d < bestDy) {
            bestDy = d;
            snapTy = newTy + (refY[ri] - propYE[pi]);
          }
        }
      }

      // Collect guide lines at final snapped position
      var fL = baseL + snapTx, fT = baseT + snapTy;
      var fR = fL + w, fB = fT + h;
      var fCX = fL + w / 2, fCY = fT + h / 2;
      var fXE = [fL, fCX, fR], fYE = [fT, fCY, fB];
      var guides = [];

      for (var pi = 0; pi < fXE.length; pi++) {
        for (var ri = 0; ri < refX.length; ri++) {
          if (Math.abs(fXE[pi] - refX[ri]) < 1) {
            var dup = false;
            for (var gi = 0; gi < guides.length; gi++) {
              if (guides[gi].axis === 'x' && Math.abs(guides[gi].pos - refX[ri]) < 1) { dup = true; break; }
            }
            if (!dup) guides.push({ axis: 'x', pos: refX[ri] });
          }
        }
      }
      for (var pi = 0; pi < fYE.length; pi++) {
        for (var ri = 0; ri < refY.length; ri++) {
          if (Math.abs(fYE[pi] - refY[ri]) < 1) {
            var dup = false;
            for (var gi = 0; gi < guides.length; gi++) {
              if (guides[gi].axis === 'y' && Math.abs(guides[gi].pos - refY[ri]) < 1) { dup = true; break; }
            }
            if (!dup) guides.push({ axis: 'y', pos: refY[ri] });
          }
        }
      }

      return { tx: snapTx, ty: snapTy, guides: guides };
    }

    function enableRepositioning(card, iframe) {
      var doc = iframe.contentDocument;
      var targets = findRepositionTargets(doc);

      // Inject reposition styles
      if (!doc.getElementById('repo-mode-styles')) {
        var style = doc.createElement('style');
        style.id = 'repo-mode-styles';
        style.textContent =
          '.repo-target { cursor: grab; border-radius: 8px; transition: box-shadow 0.15s; position: relative; }' +
          '.repo-target:hover { box-shadow: inset 0 0 0 3px rgba(245,158,11,0.5); }' +
          '.repo-target.dragging { cursor: grabbing; box-shadow: inset 0 0 0 3px #f59e0b; opacity: 0.9; }' +
          '.repo-target.selected { box-shadow: inset 0 0 0 3px #f59e0b; }' +
          '.repo-offset-badge { position: fixed; background: #f59e0b; color: #000; font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 6px; pointer-events: none; z-index: 9999; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }' +
          '.repo-snap-line { background: #f59e0b; opacity: 0.7; }';
        doc.head.appendChild(style);
      }

      // Store reference for cleanup
      card._repoState = { targets: targets, changed: false, handlers: [] };

      targets.forEach(function(el) {
        el.classList.add('repo-target');
        el.setAttribute('tabindex', '0');

        // Store original transform for cancel
        el.dataset.repoOrigTransform = el.style.transform || '';

        // Parse existing translate offset if any
        var existingTx = 0, existingTy = 0;
        var match = (el.style.transform || '').match(/translate\(\s*([-\d.]+)px\s*,\s*([-\d.]+)px\s*\)/);
        if (match) {
          existingTx = parseFloat(match[1]) || 0;
          existingTy = parseFloat(match[2]) || 0;
        }

        var state = { startX: 0, startY: 0, baseTx: existingTx, baseTy: existingTy, isDragging: false };

        function onMouseDown(e) {
          if (e.button !== 0) return;
          e.preventDefault();
          state.isDragging = true;
          state.startX = e.clientX;
          state.startY = e.clientY;

          // Read current translate at drag start
          var m = (el.style.transform || '').match(/translate\(\s*([-\d.]+)px\s*,\s*([-\d.]+)px\s*\)/);
          if (m) {
            state.baseTx = parseFloat(m[1]) || 0;
            state.baseTy = parseFloat(m[2]) || 0;
          }

          el.classList.add('dragging');

          // Select this element
          targets.forEach(function(t) { t.classList.remove('selected'); });
          el.classList.add('selected');
          el.focus();

          // Create offset badge
          var badge = doc.createElement('div');
          badge.className = 'repo-offset-badge';
          badge.id = 'repo-badge';
          doc.body.appendChild(badge);

          doc.addEventListener('mousemove', onMouseMove);
          doc.addEventListener('mouseup', onMouseUp);
        }

        function onMouseMove(e) {
          if (!state.isDragging) return;
          var dx = e.clientX - state.startX;
          var dy = e.clientY - state.startY;

          var newTx = state.baseTx + dx;
          var newTy = state.baseTy + dy;

          // Snap to alignment guides
          var snap = computeSnap(el, targets, newTx, newTy, doc);
          newTx = snap.tx;
          newTy = snap.ty;

          if (snap.guides.length > 0) {
            renderSnapGuides(doc, snap.guides);
          } else {
            clearSnapGuides(doc);
          }

          el.style.transform = 'translate(' + newTx + 'px, ' + newTy + 'px)';

          // Update badge
          var badge = doc.getElementById('repo-badge');
          if (badge) {
            var parts = [];
            if (Math.abs(newTx) > 0.5) parts.push('X: ' + (newTx > 0 ? '+' : '') + Math.round(newTx) + 'px');
            if (Math.abs(newTy) > 0.5) parts.push('Y: ' + (newTy > 0 ? '+' : '') + Math.round(newTy) + 'px');
            badge.textContent = parts.join('  ') || 'drag to move';
            badge.style.left = (e.clientX + 16) + 'px';
            badge.style.top = (e.clientY - 12) + 'px';
          }

          card._repoState.changed = true;
        }

        function onMouseUp() {
          state.isDragging = false;
          el.classList.remove('dragging');

          // Remove badge and snap guides
          var badge = doc.getElementById('repo-badge');
          if (badge) badge.remove();
          clearSnapGuides(doc);

          doc.removeEventListener('mousemove', onMouseMove);
          doc.removeEventListener('mouseup', onMouseUp);
        }

        // Arrow key nudging
        function onKeyDown(e) {
          if (!el.classList.contains('selected')) return;
          var step = e.shiftKey ? 10 : 1;
          var m = (el.style.transform || '').match(/translate\(\s*([-\d.]+)px\s*,\s*([-\d.]+)px\s*\)/);
          var tx = m ? (parseFloat(m[1]) || 0) : 0;
          var ty = m ? (parseFloat(m[2]) || 0) : 0;

          if (e.key === 'ArrowUp') {
            e.preventDefault(); ty -= step;
          } else if (e.key === 'ArrowDown') {
            e.preventDefault(); ty += step;
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault(); tx -= step;
          } else if (e.key === 'ArrowRight') {
            e.preventDefault(); tx += step;
          } else { return; }

          el.style.transform = 'translate(' + tx + 'px, ' + ty + 'px)';
          card._repoState.changed = true;
        }

        el.addEventListener('mousedown', onMouseDown);
        el.addEventListener('keydown', onKeyDown);

        // Store handlers for cleanup
        card._repoState.handlers.push({
          el: el,
          mousedown: onMouseDown,
          keydown: onKeyDown
        });
      });

      showToast('Move mode: drag elements or use arrow keys (Shift for 10px)', 'success');
    }

    function disableRepositioning(card, iframe, shouldSave) {
      var doc = iframe.contentDocument;
      var repoState = card._repoState;
      if (!repoState) return;

      var hasChanges = repoState.changed;

      // Revert transforms if cancelling
      if (!shouldSave) {
        repoState.targets.forEach(function(el) {
          el.style.transform = el.dataset.repoOrigTransform || '';
        });
      }

      // Clean up everything BEFORE serializing for save
      repoState.handlers.forEach(function(h) {
        h.el.removeEventListener('mousedown', h.mousedown);
        h.el.removeEventListener('keydown', h.keydown);
        h.el.classList.remove('repo-target', 'selected', 'dragging');
        h.el.removeAttribute('tabindex');
      });

      var styleEl = doc.getElementById('repo-mode-styles');
      if (styleEl) styleEl.remove();

      var badge = doc.getElementById('repo-badge');
      if (badge) badge.remove();

      var snapGuides = doc.getElementById('repo-snap-guides');
      if (snapGuides) snapGuides.remove();

      repoState.targets.forEach(function(el) {
        delete el.dataset.repoOrigTransform;
      });

      // Save after cleanup so serialized HTML is clean
      if (shouldSave && hasChanges) {
        saveRepositionedCreative(card, iframe);
      }

      delete card._repoState;
    }

    function saveRepositionedCreative(card, iframe) {
      var creativePath = card.querySelector('.reposition-toggle').dataset.creative;
      var fullHtml = '<!DOCTYPE html>\n' + iframe.contentDocument.documentElement.outerHTML;

      // Strip reposition artifacts before saving
      fullHtml = fullHtml.replace(/<style id="repo-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<div class="repo-offset-badge"[^>]*>[\s\S]*?<\/div>/g, '');
      fullHtml = fullHtml.replace(/<div id="repo-snap-guides"[\s\S]*?<\/div>/g, '');
      fullHtml = fullHtml.replace(/ class="repo-target( selected| dragging)*"/g, '');
      fullHtml = fullHtml.replace(/ class="repo-target"/g, '');
      fullHtml = fullHtml.replace(/ tabindex="0"/g, '');
      fullHtml = fullHtml.replace(/ data-repo-orig-transform="[^"]*"/g, '');

      // Also strip edit-mode artifacts if present
      fullHtml = fullHtml.replace(/<style id="edit-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/ contenteditable="true"/g, '');
      fullHtml = fullHtml.replace(/ spellcheck="false"/g, '');
      fullHtml = fullHtml.replace(/ data-original="[^"]*"/g, '');

      fetch('/api/ad-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creative_file: creativePath, html: fullHtml, source: (card && card.dataset && card.dataset.source) || CURRENT_MODE })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast('Layout repositioned & saved', 'success');
        } else {
          throw new Error(data.error || 'Save failed');
        }
      })
      .catch(function(err) {
        showToast('Failed to save repositioned layout: ' + err.message, 'error');
      });
    }

    // ── Resize Mode ──

      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) {
        showToast('Cannot access creative content', 'error');

        if (editBtn) toggleEditMode(editBtn);
      }
      if (card.classList.contains('reposition-mode')) {

        if (repoBtn) { card._repoCancelled = true; toggleRepositionMode(repoBtn); }

        btn.style.background = '#22c55e';
        btn.style.borderColor = '#22c55e';
        btn.style.color = '#fff';

        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'action-btn resize-cancel-btn';
        cancelBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Cancel';
        cancelBtn.addEventListener('click', function() {
          card._resizeCancelled = true;
          toggleResizeMode(btn);
        });
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);

        card._resizeCancelled = false;
        enableResizing(card, iframe);
      } else {
        var shouldSave = !card._resizeCancelled;

        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg> Resize';
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';

        var cancelEl = card.querySelector('.resize-cancel-btn');
        if (cancelEl) cancelEl.remove();

        disableResizing(card, iframe, shouldSave);
        delete card._resizeCancelled;
      }
    }

    function enableResizing(card, iframe) {
      var doc = iframe.contentDocument;
      var targets = findRepositionTargets(doc);

      // Also include .logo elements (absolutely positioned, so findRepositionTargets skips them)
      doc.querySelectorAll('.logo').forEach(function(el) {
        if (targets.indexOf(el) === -1) targets.push(el);
      });

      if (!doc.getElementById('resize-mode-styles')) {
        var style = doc.createElement('style');
        style.id = 'resize-mode-styles';
        style.textContent =
          '.resize-target { position: relative !important; border-radius: 8px; transition: box-shadow 0.15s; overflow: visible !important; }' +
          '.resize-target.logo { position: absolute !important; }' +
          '.resize-target:hover { box-shadow: inset 0 0 0 3px rgba(59,130,246,0.5); }' +
          '.resize-target.selected { box-shadow: inset 0 0 0 3px #3b82f6; }' +
          '.resize-handle { position: absolute; width: 20px; height: 20px; background: #3b82f6; border: 2px solid #fff; border-radius: 3px; z-index: 9999; box-shadow: 0 1px 6px rgba(0,0,0,0.4); transition: transform 0.1s, background 0.1s; }' +
          '.resize-handle:hover { background: #2563eb; transform-origin: center; }' +
          '.resize-handle::after { content: ""; position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px; }' +
          '.resize-handle.handle-br { bottom: 2px; right: 2px; cursor: nwse-resize; }' +
          '.resize-handle.handle-br:hover { transform: scale(1.2); }' +
          '.resize-handle.handle-r { top: 50%; right: 2px; transform: translateY(-50%); cursor: ew-resize; }' +
          '.resize-handle.handle-r:hover { transform: translateY(-50%) scale(1.2); }' +
          '.resize-handle.handle-b { bottom: 2px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }' +
          '.resize-handle.handle-b:hover { transform: translateX(-50%) scale(1.2); }' +
          '.resize-grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; background-image: linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px); background-size: 8px 8px; }' +
          '.resize-offset-badge { position: fixed; background: #3b82f6; color: #fff; font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 6px; pointer-events: none; z-index: 9999; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }';
        doc.head.appendChild(style);
      }

      card._resizeState = { targets: targets, changed: false, handlers: [], overflowEls: [] };

      // Force overflow:visible on all ancestors that clip, so handles are visible
      targets.forEach(function(el) {
        var ancestor = el.parentElement;
        while (ancestor && ancestor !== doc.body) {
          var acs = doc.defaultView.getComputedStyle(ancestor);
          if (acs.overflow === 'hidden' || acs.overflowX === 'hidden' || acs.overflowY === 'hidden') {
            ancestor.dataset.resizeOrigOverflow = ancestor.style.overflow || '';
            ancestor.style.overflow = 'visible';
            card._resizeState.overflowEls.push(ancestor);
          }
          ancestor = ancestor.parentElement;
        }
      });

      targets.forEach(function(el) {
        el.classList.add('resize-target');

        var cs = doc.defaultView.getComputedStyle(el);
        if (cs.position === 'static') el.style.position = 'relative';

        el.dataset.resizeOrigW = el.style.width || '';
        el.dataset.resizeOrigH = el.style.height || '';
        el.dataset.resizeOrigMaxW = el.style.maxWidth || '';
        el.dataset.resizeOrigMaxH = el.style.maxHeight || '';

        var handleBr = doc.createElement('div');
        handleBr.className = 'resize-handle handle-br';
        el.appendChild(handleBr);

        var handleR = doc.createElement('div');
        handleR.className = 'resize-handle handle-r';
        el.appendChild(handleR);

        var handleB = doc.createElement('div');
        handleB.className = 'resize-handle handle-b';
        el.appendChild(handleB);

        var GRID = 8;
        function snapTo(val) { return Math.round(val / GRID) * GRID; }

        function makeHandleDragger(handle, axis) {
          var state = { isDragging: false, startX: 0, startY: 0, startW: 0, startH: 0 };

          function getXY(e) {
            if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
          }

          function onDown(e) {
            e.preventDefault();
            e.stopPropagation();
            state.isDragging = true;
            var pt = getXY(e);
            state.startX = pt.x;
            state.startY = pt.y;
            var rect = el.getBoundingClientRect();
            state.startW = rect.width;
            state.startH = rect.height;

            targets.forEach(function(t) { t.classList.remove('selected'); });
            el.classList.add('selected');

            var badge = doc.createElement('div');
            badge.className = 'resize-offset-badge';
            badge.id = 'resize-badge';
            doc.body.appendChild(badge);

            // Show grid overlay while dragging
            if (!doc.getElementById('resize-grid-overlay')) {
              var grid = doc.createElement('div');
              grid.className = 'resize-grid-overlay';
              grid.id = 'resize-grid-overlay';
              doc.body.appendChild(grid);
            }

            doc.addEventListener('mousemove', onMove);
            doc.addEventListener('mouseup', onUp);
            doc.addEventListener('touchmove', onMove, { passive: false });
            doc.addEventListener('touchend', onUp);
          }

          function onMove(e) {
            if (!state.isDragging) return;
            e.preventDefault();
            var pt = getXY(e);
            var dx = pt.x - state.startX;
            var dy = pt.y - state.startY;

            if (axis === 'both' || axis === 'x') {
              var newW = snapTo(Math.max(GRID, state.startW + dx));
              el.style.width = newW + 'px';
              el.style.maxWidth = 'none';
            }
            if (axis === 'both' || axis === 'y') {
              var newH = snapTo(Math.max(GRID, state.startH + dy));
              el.style.height = newH + 'px';
              el.style.maxHeight = 'none';
            }

            var badge = doc.getElementById('resize-badge');
            if (badge) {
              var r = el.getBoundingClientRect();
              badge.textContent = Math.round(r.width) + ' \u00d7 ' + Math.round(r.height);
              badge.style.left = (pt.x + 16) + 'px';
              badge.style.top = (pt.y - 12) + 'px';
            }

            card._resizeState.changed = true;
          }

          function onUp() {
            state.isDragging = false;
            var badge = doc.getElementById('resize-badge');
            if (badge) badge.remove();
            var gridEl = doc.getElementById('resize-grid-overlay');
            if (gridEl) gridEl.remove();
            doc.removeEventListener('mousemove', onMove);
            doc.removeEventListener('mouseup', onUp);
            doc.removeEventListener('touchmove', onMove);
            doc.removeEventListener('touchend', onUp);
          }

          handle.addEventListener('mousedown', onDown);
          handle.addEventListener('touchstart', onDown, { passive: false });
          return { handle: handle, mousedown: onDown, touchstart: onDown };
        }

        var hBr = makeHandleDragger(handleBr, 'both');
        var hR = makeHandleDragger(handleR, 'x');
        var hB = makeHandleDragger(handleB, 'y');

        card._resizeState.handlers.push({
          el: el,
          handles: [hBr, hR, hB]
        });
      });

      showToast('Resize mode: drag handles to resize elements', 'success');
    }

    function disableResizing(card, iframe, shouldSave) {
      var doc = iframe.contentDocument;
      var resizeState = card._resizeState;
      if (!resizeState) return;

      var hasChanges = resizeState.changed;

      if (!shouldSave) {
        resizeState.targets.forEach(function(el) {
          el.style.width = el.dataset.resizeOrigW || '';
          el.style.height = el.dataset.resizeOrigH || '';
          el.style.maxWidth = el.dataset.resizeOrigMaxW || '';
          el.style.maxHeight = el.dataset.resizeOrigMaxH || '';
        });
      }

      resizeState.handlers.forEach(function(h) {
        h.handles.forEach(function(hd) {
          hd.handle.removeEventListener('mousedown', hd.mousedown);
          if (hd.touchstart) hd.handle.removeEventListener('touchstart', hd.touchstart);
          hd.handle.remove();
        });
        h.el.classList.remove('resize-target', 'selected');
      });

      // Restore overflow on ancestors
      (resizeState.overflowEls || []).forEach(function(ancestor) {
        ancestor.style.overflow = ancestor.dataset.resizeOrigOverflow || '';
        delete ancestor.dataset.resizeOrigOverflow;
      });

      var styleEl = doc.getElementById('resize-mode-styles');
      if (styleEl) styleEl.remove();
      var badge = doc.getElementById('resize-badge');
      if (badge) badge.remove();
      var gridEl = doc.getElementById('resize-grid-overlay');
      if (gridEl) gridEl.remove();

      resizeState.targets.forEach(function(el) {
        delete el.dataset.resizeOrigW;
        delete el.dataset.resizeOrigH;
        delete el.dataset.resizeOrigMaxW;
        delete el.dataset.resizeOrigMaxH;
      });

      if (shouldSave && hasChanges) {
        saveResizedCreative(card, iframe);
      }

      delete card._resizeState;
    }

    function saveResizedCreative(card, iframe) {
      var creativePath = card.querySelector('.resize-toggle').dataset.creative;
      var fullHtml = '<!DOCTYPE html>\n' + iframe.contentDocument.documentElement.outerHTML;

      fullHtml = fullHtml.replace(/<style id="resize-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<div class="resize-grid-overlay"[^>]*><\/div>/g, '');
      fullHtml = fullHtml.replace(/<div class="resize-handle[^"]*"[^>]*><\/div>/g, '');
      fullHtml = fullHtml.replace(/ class="resize-target( selected)?"/g, '');
      fullHtml = fullHtml.replace(/ data-resize-orig-w="[^"]*"/g, '');
      fullHtml = fullHtml.replace(/ data-resize-orig-h="[^"]*"/g, '');
      fullHtml = fullHtml.replace(/ data-resize-orig-max-w="[^"]*"/g, '');
      fullHtml = fullHtml.replace(/ data-resize-orig-max-h="[^"]*"/g, '');
      fullHtml = fullHtml.replace(/ data-resize-orig-overflow="[^"]*"/g, '');

      fullHtml = fullHtml.replace(/<style id="repo-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<style id="edit-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/ contenteditable="true"/g, '');
      fullHtml = fullHtml.replace(/ spellcheck="false"/g, '');
      fullHtml = fullHtml.replace(/ data-original="[^"]*"/g, '');

      fetch('/api/ad-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creative_file: creativePath, html: fullHtml, source: (card && card.dataset && card.dataset.source) || CURRENT_MODE })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast('Elements resized & saved', 'success');
        } else {
          throw new Error(data.error || 'Save failed');
        }
      })
      .catch(function(err) {
        showToast('Failed to save resized layout: ' + err.message, 'error');
      });
    }

    // ── Photo Reposition Mode ──
    // Drag photos within their shape to adjust object-position

    function togglePhotoReposition(btn) {
      var card = btn.closest('.ad-card');
      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) {
        showToast('Cannot access creative content', 'error');
        return;
      }

      // Exit other modes if active
      if (card.classList.contains('edit-mode')) {
        var editBtn = card.querySelector('.edit-toggle');
        if (editBtn) toggleEditMode(editBtn);
      }
      if (card.classList.contains('reposition-mode')) {
        var repoBtn = card.querySelector('.reposition-toggle');
        if (repoBtn) {
          card._repoCancelled = false;
          toggleRepositionMode(repoBtn);
        }
      }
      if (card.classList.contains('resize-mode')) {
        var resizeBtnEl = card.querySelector('.resize-toggle');
        if (resizeBtnEl) { card._resizeCancelled = true; toggleResizeMode(resizeBtnEl); }
      }

      var isActive = card.classList.contains('photo-repo-mode');

      if (!isActive) {
        // Enter mode — show Save + Cancel
        card.classList.add('photo-repo-mode');
        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Save';
        btn.style.background = '#22c55e';
        btn.style.borderColor = '#22c55e';
        btn.style.color = '#fff';

        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'action-btn photo-cancel-btn';
        cancelBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Cancel';
        cancelBtn.addEventListener('click', function() {
          exitPhotoMode(card, iframe, btn, false);
        });
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);

        enablePhotoReposition(card, iframe);
      } else {
        // Save button clicked
        exitPhotoMode(card, iframe, btn, true);
      }
    }

    function exitPhotoMode(card, iframe, btn, shouldSave) {
      var photoState = card._photoRepoState;

      // Revert positions if not saving
      if (!shouldSave && photoState && photoState.originalPositions) {
        photoState.originalPositions.forEach(function(entry) {
          entry.img.style.objectPosition = entry.position;
        });
      }

      // Override changed flag based on decision
      if (photoState) photoState.changed = shouldSave;

      card.classList.remove('photo-repo-mode');

      // Restore Photo button
      btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg> Photo';
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';

      // Remove cancel button
      var cancelEl = card.querySelector('.photo-cancel-btn');
      if (cancelEl) cancelEl.remove();

      disablePhotoReposition(card, iframe);
    }

    function findPhotoTargets(doc) {
      var imgs = doc.querySelectorAll('img');
      var targets = [];
      for (var i = 0; i < imgs.length; i++) {
        var img = imgs[i];
        var cs = doc.defaultView.getComputedStyle(img);
        if (cs.objectFit === 'cover') targets.push(img);
      }
      return targets;
    }

    function getPhotoOverflow(img, doc) {
      var rect = img.getBoundingClientRect();
      var natW = img.naturalWidth;
      var natH = img.naturalHeight;
      if (!natW || !natH) return { x: 0, y: 0 };

      var scaleX = rect.width / natW;
      var scaleY = rect.height / natH;
      var scale = Math.max(scaleX, scaleY);

      return {
        x: natW * scale - rect.width,
        y: natH * scale - rect.height,
      };
    }

    function parseObjectPosition(img, doc) {
      var raw = doc.defaultView.getComputedStyle(img).objectPosition || '50% 50%';
      var parts = raw.split(/\s+/);
      return {
        x: parseFloat(parts[0]) || 50,
        y: parseFloat(parts[1]) || 50,
      };
    }

    function enablePhotoReposition(card, iframe) {
      var doc = iframe.contentDocument;
      var targets = findPhotoTargets(doc);

      if (targets.length === 0) {
        showToast('No cover-fitted photos found in this creative', 'error');
        card.classList.remove('photo-repo-mode');
        var btn = card.querySelector('.photo-repo-toggle');
        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg> Photo';
        return;
      }

      // Inject styles into iframe
      if (!doc.getElementById('photo-repo-styles')) {
        var style = doc.createElement('style');
        style.id = 'photo-repo-styles';
        style.textContent =
          '.photo-repo-active { cursor: grab !important; }' +
          '.photo-repo-active:active { cursor: grabbing !important; }' +
          '.photo-repo-active.dragging { cursor: grabbing !important; }' +
          '.photo-repo-hint { position: absolute; top: 8px; left: 8px; background: rgba(139,92,246,0.85); color: #fff; font-family: -apple-system, sans-serif; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.15s; }' +
          '.photo-repo-wrap:hover .photo-repo-hint, .photo-repo-wrap.dragging .photo-repo-hint { opacity: 1; }' +
          '.photo-repo-wrap.dragging .photo-repo-hint { background: rgba(139,92,246,1); }' +
          '.photo-repo-badge { position: fixed; background: #8b5cf6; color: #fff; font-family: -apple-system, monospace; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; pointer-events: none; z-index: 9999; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }';
        doc.head.appendChild(style);
      }

      // Store original positions for revert
      var originalPositions = [];
      targets.forEach(function(img) {
        var pos = doc.defaultView.getComputedStyle(img).objectPosition || '50% 50%';
        originalPositions.push({ img: img, position: pos });
      });

      card._photoRepoState = { targets: targets, changed: false, handlers: [], originalPositions: originalPositions };

      targets.forEach(function(img) {
        img.classList.add('photo-repo-active');
        img.setAttribute('draggable', 'false');

        // Add hint label to parent
        var wrap = img.parentElement;
        if (wrap) {
          var wrapCs = doc.defaultView.getComputedStyle(wrap);
          if (wrapCs.position === 'static') wrap.style.position = 'relative';
          wrap.classList.add('photo-repo-wrap');
          var hint = doc.createElement('div');
          hint.className = 'photo-repo-hint';
          hint.textContent = 'Drag to reposition';
          wrap.appendChild(hint);
        }

        var state = { isDragging: false, startX: 0, startY: 0, startPosX: 50, startPosY: 50 };

        function onMouseDown(e) {
          if (e.button !== 0) return;
          e.preventDefault();
          state.isDragging = true;

          var pos = parseObjectPosition(img, doc);
          state.startPosX = pos.x;
          state.startPosY = pos.y;
          state.startX = e.clientX;
          state.startY = e.clientY;

          img.classList.add('dragging');
          if (wrap) wrap.classList.add('dragging');

          // Create badge
          var badge = doc.createElement('div');
          badge.className = 'photo-repo-badge';
          badge.id = 'photo-repo-badge';
          doc.body.appendChild(badge);

          doc.addEventListener('mousemove', onMouseMove);
          doc.addEventListener('mouseup', onMouseUp);
        }

        function onMouseMove(e) {
          if (!state.isDragging) return;
          e.preventDefault();

          var dx = e.clientX - state.startX;
          var dy = e.clientY - state.startY;
          var overflow = getPhotoOverflow(img, doc);

          // Grab-and-move: drag right → image moves right → show more left → decrease %
          var newX = overflow.x > 0
            ? Math.max(0, Math.min(100, state.startPosX - (dx / overflow.x) * 100))
            : state.startPosX;
          var newY = overflow.y > 0
            ? Math.max(0, Math.min(100, state.startPosY - (dy / overflow.y) * 100))
            : state.startPosY;

          img.style.objectPosition = newX.toFixed(1) + '% ' + newY.toFixed(1) + '%';

          // Update badge near cursor
          var badge = doc.getElementById('photo-repo-badge');
          if (badge) {
            badge.textContent = 'object-position: ' + newX.toFixed(1) + '% ' + newY.toFixed(1) + '%';
            badge.style.left = (e.clientX + 16) + 'px';
            badge.style.top = (e.clientY - 12) + 'px';
          }

          // Also update the hint
          var hintEl = wrap ? wrap.querySelector('.photo-repo-hint') : null;
          if (hintEl) hintEl.textContent = newX.toFixed(1) + '% ' + newY.toFixed(1) + '%';

          card._photoRepoState.changed = true;
        }

        function onMouseUp() {
          state.isDragging = false;
          img.classList.remove('dragging');
          if (wrap) wrap.classList.remove('dragging');

          var badge = doc.getElementById('photo-repo-badge');
          if (badge) badge.remove();

          // Restore hint text
          var hintEl = wrap ? wrap.querySelector('.photo-repo-hint') : null;
          if (hintEl) hintEl.textContent = 'Drag to reposition';

          doc.removeEventListener('mousemove', onMouseMove);
          doc.removeEventListener('mouseup', onMouseUp);
        }

        img.addEventListener('mousedown', onMouseDown);
        card._photoRepoState.handlers.push({
          img: img,
          wrap: wrap,
          mousedown: onMouseDown,
        });
      });

      showToast('Photo mode: drag photos to reposition within their shape', 'success');
    }

    function disablePhotoReposition(card, iframe) {
      var doc = iframe.contentDocument;
      var photoState = card._photoRepoState;
      if (!photoState) return;

      var hasChanges = photoState.changed;

      // Clean up handlers and classes
      photoState.handlers.forEach(function(h) {
        h.img.removeEventListener('mousedown', h.mousedown);
        h.img.classList.remove('photo-repo-active', 'dragging');
        h.img.removeAttribute('draggable');
        if (h.wrap) {
          h.wrap.classList.remove('photo-repo-wrap', 'dragging');
          var hint = h.wrap.querySelector('.photo-repo-hint');
          if (hint) hint.remove();
        }
      });

      var styleEl = doc.getElementById('photo-repo-styles');
      if (styleEl) styleEl.remove();
      var badge = doc.getElementById('photo-repo-badge');
      if (badge) badge.remove();

      // Save the creative with updated object-position
      if (hasChanges) {
        savePhotoRepoCreative(card, iframe);
      }

      delete card._photoRepoState;
    }

    function savePhotoRepoCreative(card, iframe) {
      var creativePath = card.querySelector('.photo-repo-toggle').dataset.creative;
      var fullHtml = '<!DOCTYPE html>\n' + iframe.contentDocument.documentElement.outerHTML;

      // Strip photo-repo artifacts before saving
      fullHtml = fullHtml.replace(/<style id="photo-repo-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<div class="photo-repo-hint"[^>]*>[^<]*<\/div>/g, '');
      fullHtml = fullHtml.replace(/<div class="photo-repo-badge"[^>]*>[^<]*<\/div>/g, '');
      fullHtml = fullHtml.replace(/ class="photo-repo-active( dragging)*"/g, '');
      fullHtml = fullHtml.replace(/ class="photo-repo-active"/g, '');
      fullHtml = fullHtml.replace(/ class="photo-repo-wrap( dragging)*"/g, '');
      fullHtml = fullHtml.replace(/ class="photo-repo-wrap"/g, '');
      fullHtml = fullHtml.replace(/ draggable="false"/g, '');

      // Also strip edit/repo artifacts
      fullHtml = fullHtml.replace(/<style id="repo-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<style id="edit-mode-styles">[\s\S]*?<\/style>/, '');

      fetch('/api/ad-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creative_file: creativePath, html: fullHtml, source: (card && card.dataset && card.dataset.source) || CURRENT_MODE })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast('Photo position saved', 'success');
        } else {
          throw new Error(data.error || 'Save failed');
        }
      })
      .catch(function(err) {
        showToast('Failed to save photo position: ' + err.message, 'error');
      });
    }

    // ── Export Functions ──

    var SVG_ICON = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    var PNG_ICON = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

    // ── Toggle Logo / URL in Creative ──

    function ensureToggleStyles(doc) {
      if (doc.getElementById('toggle-element-styles')) return;
      var style = doc.createElement('style');
      style.id = 'toggle-element-styles';
      style.textContent =
        '.hide-logo .logo { display: none !important; visibility: hidden !important; }' +
        '.hide-url .url { display: none !important; visibility: hidden !important; }' +
        '.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }';
      doc.head.appendChild(style);
    }

    function toggleCreativeElement(btn, type) {
      var card = btn.closest('.ad-card');
      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) {
        showToast('No creative to modify — wait for it to load', 'error');
        return;
      }

      var doc = iframe.contentDocument;
      ensureToggleStyles(doc);

      // If toggling eyebrow and no pill elements exist, create a default one
      if (type === 'eyebrow') {
        var pillEls = doc.querySelectorAll('.eyebrow, .detail-pill, .cta-pill');
        if (pillEls.length === 0) {
          var pill = doc.createElement('div');
          pill.className = 'eyebrow';
          pill.innerHTML = '<span>Pill text here</span>';
          var container = doc.querySelector('.ad') || doc.body;
          container.insertBefore(pill, container.firstChild);
          if (!doc.querySelector('style.eyebrow-injected')) {
            var s = doc.createElement('style');
            s.className = 'eyebrow-injected';
            s.textContent = '.eyebrow { flex-shrink: 0; background: #C2E9FF; border-radius: 100px; padding: 10px 28px; margin-bottom: 20px; } .eyebrow span { font-family: "Hanken Grotesk", sans-serif; font-weight: 600; font-size: 22px; color: #1A1A1A; }';
            doc.head.appendChild(s);
          }
          markUnsaved(card);
          return;
        }
      }

      // If toggling url and no .url element exists, inject a default URL element
      if (type === 'url') {
        var urlEls = doc.querySelectorAll('.url');
        if (urlEls.length === 0) {
          var urlDiv = doc.createElement('div');
          urlDiv.className = 'url';
          urlDiv.textContent = 'tutero.com.au';
          doc.body.appendChild(urlDiv);
          if (!doc.querySelector('style.url-injected')) {
            var s = doc.createElement('style');
            s.className = 'url-injected';
            s.textContent = '.url { position: absolute; bottom: 50px; right: 60px; font-family: "Hanken Grotesk", sans-serif; font-weight: 600; font-size: 22px; color: #004166; z-index: 10; }';
            doc.head.appendChild(s);
          }
          markUnsaved(card);
          return;
        }
      }

      // If toggling logo and no .logo element exists, inject the coloured Tutero logo
      if (type === 'logo') {
        var logoEls = doc.querySelectorAll('.logo');
        if (logoEls.length === 0) {
          var logoImg = doc.createElement('img');
          logoImg.className = 'logo';
          logoImg.alt = 'Tutero';
          // Determine relative path based on creative depth (social/ subfolder vs creatives/)
          var iframeSrc = iframe.src || iframe.getAttribute('src') || '';
          logoImg.src = iframeSrc.indexOf('/social/') !== -1 ? '../../images/tutero-logo.svg' : '../images/tutero-logo.svg';
          doc.body.appendChild(logoImg);
          if (!doc.querySelector('style.logo-injected')) {
            var s = doc.createElement('style');
            s.className = 'logo-injected';
            s.textContent = '.logo { position: absolute; bottom: 50px; left: 60px; height: 50px; width: auto; z-index: 10; }';
            doc.head.appendChild(s);
          }
          markUnsaved(card);
          return;
        }
      }

      var toggleClass = 'hide-' + type;
      // Use doc.body — it's always stable and won't be replaced by re-renders
      var isNowHidden = doc.body.classList.toggle(toggleClass);

      // Sync button appearance to match the iframe's actual state
      btn.classList.toggle('active', isNowHidden);

      // Direct style override as fallback (handles eyebrow, detail-pill, cta-pill)
      var selectors = { eyebrow: '.eyebrow, .detail-pill, .cta-pill', logo: '.logo', url: '.url' };
      if (selectors[type]) {
        doc.querySelectorAll(selectors[type]).forEach(function(el) {
          el.style.display = isNowHidden ? 'none' : '';
        });
      }

      // Mark card as having unsaved changes & show save button
      markUnsaved(card);
    }

    function markUnsaved(card) {
      var hasAnyToggle = card.querySelector('.card-actions .action-btn.active[title*="Toggle"]');
      if (hasAnyToggle) {
        card.classList.add('has-unsaved');
        var saveBtn = card.querySelector('.save-creative-btn');
        if (saveBtn) saveBtn.style.display = '';
      } else {
        card.classList.remove('has-unsaved');
        var saveBtn = card.querySelector('.save-creative-btn');
        if (saveBtn) saveBtn.style.display = 'none';
      }
    }

    function saveCreativeState(btn) {
      var card = btn.closest('.ad-card');
      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) {
        showToast('Cannot access creative', 'error');
        return;
      }

      var editToggle = card.querySelector('.edit-toggle');
      var creativePath = editToggle ? editToggle.dataset.creative : null;
      if (!creativePath) {
        var repoToggle = card.querySelector('.reposition-toggle');
        creativePath = repoToggle ? repoToggle.dataset.creative : null;
      }
      if (!creativePath) {
        showToast('No creative file path found', 'error');
        return;
      }

      var doc = iframe.contentDocument;

      // Remove toggled-off elements from the DOM before serializing
      var logoBtn = card.querySelector('.action-btn[title="Toggle logo visibility"]');
      var urlBtn = card.querySelector('.action-btn[title="Toggle URL visibility"]');
      var removedEls = [];

      if (logoBtn && logoBtn.classList.contains('active')) {
        doc.querySelectorAll('.logo').forEach(function(el) {
          removedEls.push({ el: el, parent: el.parentNode, next: el.nextSibling });
          el.remove();
        });
      }
      if (urlBtn && urlBtn.classList.contains('active')) {
        doc.querySelectorAll('.url').forEach(function(el) {
          removedEls.push({ el: el, parent: el.parentNode, next: el.nextSibling });
          el.remove();
        });
      }
      var eyebrowBtn = card.querySelector('.action-btn[title="Toggle pill visibility"]');
      if (eyebrowBtn && eyebrowBtn.classList.contains('active')) {
        doc.querySelectorAll('.eyebrow, .detail-pill, .cta-pill').forEach(function(el) {
          removedEls.push({ el: el, parent: el.parentNode, next: el.nextSibling });
          el.remove();
        });
      }

      // Serialize clean HTML (elements actually removed, not just hidden)
      var fullHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
      fullHtml = fullHtml.replace(/<style id="toggle-element-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<style id="edit-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/<style id="repo-mode-styles">[\s\S]*?<\/style>/, '');
      fullHtml = fullHtml.replace(/ hide-logo/g, '');
      fullHtml = fullHtml.replace(/ hide-url/g, '');
      fullHtml = fullHtml.replace(/ hide-eyebrow/g, '');
      fullHtml = fullHtml.replace(/ contenteditable="true"/g, '');
      fullHtml = fullHtml.replace(/ spellcheck="false"/g, '');
      fullHtml = fullHtml.replace(/ data-original="[^"]*"/g, '');

      btn.textContent = 'Saving...';
      btn.disabled = true;

      fetch('/api/ad-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creative_file: creativePath, html: fullHtml, source: (card && card.dataset && card.dataset.source) || CURRENT_MODE })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          card.classList.remove('has-unsaved');
          btn.style.display = 'none';
          btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Save';
          btn.disabled = false;

          // Reset toggle buttons and iframe classes since elements are permanently removed
          if (logoBtn && logoBtn.classList.contains('active')) logoBtn.classList.remove('active');
          if (urlBtn && urlBtn.classList.contains('active')) urlBtn.classList.remove('active');
          if (eyebrowBtn && eyebrowBtn.classList.contains('active')) eyebrowBtn.classList.remove('active');
          doc.body.classList.remove('hide-logo', 'hide-url', 'hide-eyebrow');

          showToast('Creative saved — toggled elements permanently removed', 'success');
        } else {
          throw new Error(data.error || 'Save failed');
        }
      })
      .catch(function(err) {
        // Restore elements back into live DOM on failure so preview still works
        removedEls.reverse().forEach(function(r) {
          if (r.next) r.parent.insertBefore(r.el, r.next);
          else r.parent.appendChild(r.el);
        });
        btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Save';
        btn.disabled = false;
        showToast('Failed to save: ' + err.message, 'error');
      });
    }

    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function downloadDataUrl(dataUrl, filename) {
      var link = document.createElement('a');
      link.download = filename;
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Inject html-to-image into iframe for PNG capture
    var HTI_CDN = 'https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js';

    function ensureHtiInIframe(iframe) {
      var win = iframe.contentWindow;
      if (win.htmlToImage) return Promise.resolve(win);
      return new Promise(function(resolve, reject) {
        var script = iframe.contentDocument.createElement('script');
        script.src = HTI_CDN;
        script.onload = function() { resolve(win); };
        script.onerror = function() { reject(new Error('Failed to load html-to-image in iframe')); };
        iframe.contentDocument.head.appendChild(script);
      });
    }

    // Freeze every element's computed width/height as inline styles so
    // html-to-image's DOM clone preserves the exact layout (prevents
    // text reflow after contenteditable edits).
    function freezeLayout(root) {
      var frozen = [];
      var all = root.querySelectorAll('*');
      for (var i = 0; i < all.length; i++) {
        var el = all[i];
        var tag = el.tagName.toUpperCase();
        if (tag === 'SVG' || tag === 'IMG' || tag === 'STYLE' || tag === 'SCRIPT' || tag === 'LINK') continue;
        var cs = root.ownerDocument.defaultView.getComputedStyle(el);
        if (cs.display === 'none') continue;
        var prev = {
          el: el,
          width: el.style.width,
          height: el.style.height,
          whiteSpace: el.style.whiteSpace
        };
        var rect = el.getBoundingClientRect();
        el.style.width = rect.width + 'px';
        el.style.height = rect.height + 'px';
        if (!el.style.whiteSpace) {
          el.style.whiteSpace = cs.whiteSpace;
        }
        frozen.push(prev);
      }
      return frozen;
    }

    function unfreezeLayout(frozen) {
      for (var i = 0; i < frozen.length; i++) {
        var f = frozen[i];
        f.el.style.width = f.width;
        f.el.style.height = f.height;
        f.el.style.whiteSpace = f.whiteSpace;
      }
    }

    function captureFromIframe(card, method) {
      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) {
        return Promise.reject(new Error('Cannot access iframe content'));
      }
      return ensureHtiInIframe(iframe).then(function(win) {
        var iframeSrc = iframe.src || '';
        var isSocial = iframeSrc.indexOf('/social/') !== -1;
        // Social creatives: body is the full 1080×1350 canvas.
        // Paid ads: .ad is the 1080×1350 card inside a dark body.
        var node = isSocial ? win.document.body : (win.document.querySelector('.ad') || win.document.body);
        var frozen = freezeLayout(node);
        return win.htmlToImage[method](node, {
          width: isSocial ? 1080 : undefined,
          height: isSocial ? 1350 : undefined,
          pixelRatio: 1,
          cacheBust: true,
          style: { borderRadius: '0' }
        }).then(function(result) {
          unfreezeLayout(frozen);
          return result;
        }).catch(function(err) {
          unfreezeLayout(frozen);
          throw err;
        });
      });
    }

    // ── Native SVG Builder ──
    // Walks the creative DOM and produces real SVG elements (rect, text, image)
    // that Figma can import as editable objects.

    function buildNativeSvg(card) {
      var iframe = card.querySelector('.preview iframe');
      if (!iframe || !iframe.contentDocument) return null;

      var win = iframe.contentWindow;
      var doc = iframe.contentDocument;
      var iframeSrc = iframe.src || '';
      var isSocial = iframeSrc.indexOf('/social/') !== -1;
      var adNode = isSocial ? doc.body : doc.querySelector('.ad');
      if (!adNode) return null;

      var adRect = adNode.getBoundingClientRect();
      var svgDefs = [];
      var svgBody = [];
      var uid = 0;

      function nextId() { return 'e' + (uid++); }

      function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')

      function relRect(el) {
        var r = el.getBoundingClientRect();
        return {
          x: Math.round(r.left - adRect.left),
          y: Math.round(r.top - adRect.top),
          w: Math.round(r.width),
          h: Math.round(r.height)
        };
      }

      function isTransparent(c) {
        return !c || c === 'transparent' || c === 'rgba(0, 0, 0, 0)' || c === 'none';
      }

      function fontName(ff) {

      }

      // Convert rgb()/rgba() → hex for Figma SVG compatibility
      function colorToHex(c) {
        if (!c || c === 'transparent' || c === 'rgba(0, 0, 0, 0)') return 'none';

        if (!m) return c;
        return '#' + ((1 << 24) + (parseInt(m[1]) << 16) + (parseInt(m[2]) << 8) + parseInt(m[3])).toString(16).slice(1);
      }

      // Convert an <img> to a data URI, handling object-fit: cover
      function imgDataUri(img, r) {
        try {
          var c = doc.createElement('canvas');
          var nw = img.naturalWidth || r.w;
          var nh = img.naturalHeight || r.h;
          c.width = r.w; c.height = r.h;
          var ctx = c.getContext('2d');
          var scale = Math.max(r.w / nw, r.h / nh);
          var sw = nw * scale, sh = nh * scale;
          ctx.drawImage(img, (r.w - sw) / 2, (r.h - sh) / 2, sw, sh);
          return c.toDataURL('image/png');
        } catch (e) { return img.src; }
      }

      // Parse CSS linear-gradient into SVG linearGradient, returns fill url or null
      function addGradient(bgImage) {
        var m = bgImage.match(/linear-gradient\((.+)\)$/);
        if (!m) return null;
        // Split args respecting parentheses
        var args = [], depth = 0, cur = '';
        for (var i = 0; i < m[1].length; i++) {
          var ch = m[1][i];
          if (ch === '(') depth++;
          else if (ch === ')') depth--;
          if (ch === ',' && depth === 0) { args.push(cur.trim()); cur = ''; }
          else cur += ch;
        }
        if (cur.trim()) args.push(cur.trim());

        var angle = 180, startIdx = 0;
        if (args[0].match(/[\d.]+deg/)) { angle = parseFloat(args[0]); startIdx = 1; }
        else if (args[0] === 'to right')  { angle = 90;  startIdx = 1; }
        else if (args[0] === 'to left')   { angle = 270; startIdx = 1; }
        else if (args[0] === 'to bottom') { angle = 180; startIdx = 1; }
        else if (args[0] === 'to top')    { angle = 0;   startIdx = 1; }

        var stops = [];
        for (var i = startIdx; i < args.length; i++) {
          var cm = args[i].match(/(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\))\s*(\d+)?%?/);
          if (cm) stops.push({ color: colorToHex(cm[1]), offset: cm[2] || null });
        }
        if (stops.length < 2) return null;

        // Fill in missing offsets (even spread)
        if (!stops[0].offset) stops[0].offset = '0';
        if (!stops[stops.length - 1].offset) stops[stops.length - 1].offset = '100';
        for (var i = 1; i < stops.length - 1; i++) {
          if (!stops[i].offset) {
            var p = i - 1, n = i + 1;
            while (n < stops.length && !stops[n].offset) n++;
            var pv = parseFloat(stops[p].offset), nv = parseFloat(stops[n].offset);
            for (var j = p + 1; j < n; j++)
              stops[j].offset = String(Math.round(pv + (nv - pv) * (j - p) / (n - p)));
          }
        }

        // CSS angle → SVG gradient coords
        var rad = angle * Math.PI / 180;
        var sinA = Math.sin(rad), cosA = Math.cos(rad);
        var gid = nextId();
        var stopsXml = stops.map(function(s) {
          return '<stop offset="' + s.offset + '%" stop-color="' + s.color + '"/>';
        }).join('');
        svgDefs.push(
          '<linearGradient id="' + gid + '" x1="' + (50 - sinA * 50).toFixed(1) +
          '%" y1="' + (50 + cosA * 50).toFixed(1) +
          '%" x2="' + (50 + sinA * 50).toFixed(1) +
          '%" y2="' + (50 - cosA * 50).toFixed(1) + '%">' +
          stopsXml + '</linearGradient>'
        );
        return 'url(#' + gid + ')';
      }

      // Extract text from direct text nodes and split into visual lines
      function getTextLines(el) {
        // Collect text from direct text-node children only
        var text = '';
        for (var ni = 0; ni < el.childNodes.length; ni++) {
          if (el.childNodes[ni].nodeType === 3) text += el.childNodes[ni].textContent;
        }
        text = text.trim().replace(/\s+/g, ' ');
        if (!text) return [];

        var r = relRect(el);
        var elCs = win.getComputedStyle(el);
        var lh = parseFloat(elCs.lineHeight);
        if (isNaN(lh)) lh = parseFloat(elCs.fontSize) * 1.2;

        // Single line: element height fits ~1 line
        if (r.h <= lh * 1.6) {
          return [{ text: text, top: r.y }];
        }

        // Multi-line: use canvas to measure word wrapping
        var fontSize = parseFloat(elCs.fontSize);
        var cvs = doc.createElement('canvas');
        var ctx = cvs.getContext('2d');
        ctx.font = elCs.fontWeight + ' ' + fontSize + 'px ' + elCs.fontFamily;

        var words = text.split(' ');
        var lines = [];
        var cur = words[0];
        for (var wi = 1; wi < words.length; wi++) {
          var test = cur + ' ' + words[wi];
          if (ctx.measureText(test).width > r.w * 0.98) {
            lines.push({ text: cur, top: r.y + lines.length * lh });
            cur = words[wi];
          } else {
            cur = test;
          }
        }
        lines.push({ text: cur, top: r.y + lines.length * lh });
        return lines;
      }

      // Recursive DOM walker
      function walk(el, clipId) {
        var cs = win.getComputedStyle(el);
        if (cs.display === 'none' || cs.visibility === 'hidden') return;
        var r = relRect(el);

        var tag = el.tagName.toUpperCase();

          var clone = el.cloneNode(true);

          clone.setAttribute('width', r.w); clone.setAttribute('height', r.h);

          svgBody.push(new win.XMLSerializer().serializeToString(clone));
          return;

        var bg = colorToHex(cs.backgroundColor);
        var bgImage = cs.backgroundImage;
        var brTL = parseFloat(cs.borderTopLeftRadius) || 0;
        var overflow = cs.overflow;
        var isCircle = brTL >= Math.min(r.w, r.h) / 2 && Math.abs(r.w - r.h) < 2;

        // Clip path for overflow:hidden + border-radius
        var newClip = null;
        if (overflow === 'hidden' && brTL > 0) {
          newClip = nextId();
          if (isCircle) {
            svgDefs.push('<clipPath id="' + newClip + '"><circle cx="' + (r.x + r.w / 2) +
              '" cy="' + (r.y + r.h / 2) + '" r="' + (r.w / 2) + '"/></clipPath>');
          } else {
            svgDefs.push('<clipPath id="' + newClip + '"><rect x="' + r.x + '" y="' + r.y +
              '" width="' + r.w + '" height="' + r.h + '" rx="' + Math.round(brTL) + '"/></clipPath>');
          }

        var activeClip = newClip || clipId;
        var ca = activeClip ? ' clip-path="url(#' + activeClip + ')"' : '';

        // Background rect
        if (!isTransparent(bg)) {
          if (isCircle) {
            svgBody.push('<circle cx="' + (r.x + r.w / 2) + '" cy="' + (r.y + r.h / 2) +
              '" r="' + (r.w / 2) + '" fill="' + bg + '"/>');
          } else {
            svgBody.push('<rect x="' + r.x + '" y="' + r.y + '" width="' + r.w + '" height="' + r.h +
              '" fill="' + bg + '"' + (brTL > 0 ? ' rx="' + Math.round(brTL) + '"' : '') + '/>');
          }
        }

        // Background gradient overlay (skip if it's gradient text)
        var bgClip = cs.backgroundClip || cs.webkitBackgroundClip || '';
        var isGradientText = bgImage && bgImage.indexOf('gradient') !== -1 &&
          (bgClip === 'text' || bgClip === '-webkit-text' || cs.color === 'transparent' || cs.color === 'rgba(0, 0, 0, 0)');
        if (bgImage && bgImage !== 'none' && bgImage.indexOf('gradient') !== -1 && !isGradientText) {
          var gf = addGradient(bgImage);
          if (gf) {
            svgBody.push('<rect x="' + r.x + '" y="' + r.y + '" width="' + r.w + '" height="' + r.h +
              '" fill="' + gf + '"' + ca + '/>');
          }
        }

        // Images
        if (tag === 'IMG' && el.complete && el.naturalWidth > 0) {
          svgBody.push('<image x="' + r.x + '" y="' + r.y + '" width="' + r.w + '" height="' + r.h +
            '" href="' + imgDataUri(el, r) + '"' + ca + '/>');
        }

        // Text — only process leaf text or direct text nodes
        var hasDirectText = false;
        for (var i = 0; i < el.childNodes.length; i++) {
          if (el.childNodes[i].nodeType === 3 && el.childNodes[i].textContent.trim()) {
            hasDirectText = true; break;
          }
        }

        if (hasDirectText) {
          var fontSize = parseFloat(cs.fontSize);
          var ff = fontName(cs.fontFamily);
          var fw = cs.fontWeight;
          var color = colorToHex(cs.color);
          var textAlign = cs.textAlign;

          // Gradient text (background-clip: text or transparent color with gradient)
          if (isGradientText) {
            var gfill = addGradient(bgImage);
            if (gfill) color = gfill;
          }

          var lines = getTextLines(el);
          // Fallback: if Range API returned nothing, use textContent
          if (lines.length === 0 && el.textContent.trim()) {
            lines = [{ text: el.textContent.trim(), top: r.y }];
          }
          if (lines.length > 0) {
            var tx = r.x, anchor = 'start';
            if (textAlign === 'center') { tx = r.x + r.w / 2; anchor = 'middle'; }
            else if (textAlign === 'right' || textAlign === 'end') { tx = r.x + r.w; anchor = 'end'; }

            var quotedFf = ff.indexOf(' ') !== -1 ? "'" + esc(ff) + "'" : esc(ff);
            var attrs = ' font-family="' + quotedFf + '" font-size="' + fontSize +
              '" font-weight="' + fw + '" fill="' + color + '" text-anchor="' + anchor + '"';

            if (lines.length === 1) {
              svgBody.push('<text x="' + tx + '" y="' + Math.round(lines[0].top + fontSize * 0.82) + '"' +
                attrs + '>' + esc(lines[0].text) + '</text>');
            } else {
              var t = '<text' + attrs + '>';
              lines.forEach(function(ln) {
                t += '<tspan x="' + tx + '" y="' + Math.round(ln.top + fontSize * 0.82) + '">' +
                  esc(ln.text) + '</tspan>';
              });
              t += '</text>';
              svgBody.push(t);
            }
          }
        }

        // Recurse into children
        for (var ci = 0; ci < el.children.length; ci++) {
          walk(el.children[ci], activeClip);
        }
      }

      walk(adNode, null);

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">';
      if (svgDefs.length > 0) svg += '<defs>' + svgDefs.join('') + '</defs>';
      svg += svgBody.join('');
      svg += '</svg>';
      return svg;
    }

    function exportAsSvg(btn) {
      var card = btn.closest('.ad-card');
      var adName = btn.dataset.name;

      btn.classList.add('exporting');
      var origSvgHtml = btn.innerHTML;
      btn.innerHTML = '... SVG';

      setTimeout(function() {
        try {
          var svgString = buildNativeSvg(card);
          if (!svgString) throw new Error('Could not access creative');

          navigator.clipboard.writeText(svgString).then(function() {
            btn.classList.remove('exporting');
            btn.classList.add('exported');
            btn.innerHTML = '&#10003; Copied';
            showToast('SVG copied — paste into Figma with Cmd+V', 'success');
            setTimeout(function() {
              btn.classList.remove('exported');
              btn.innerHTML = origSvgHtml;
            }, 3000);
          }).catch(function(err) {
            throw err;
          });
        } catch (err) {
          btn.classList.remove('exporting');
          btn.innerHTML = origSvgHtml;
          showToast('SVG export failed: ' + err.message, 'error');
          console.error('SVG export error:', err);
        }
      }, 50);
    }

    function exportAsPng(btn) {
      var card = btn.closest('.ad-card');
      var adName = btn.dataset.name;
      var fallbackImage = btn.dataset.image;

      btn.classList.add('exporting');
      var origPngHtml = btn.innerHTML;
      btn.innerHTML = '... PNG';

      captureFromIframe(card, 'toPng')
      .then(function(dataUrl) {
        downloadDataUrl(dataUrl, slugify(adName) + '.png');
        btn.classList.remove('exporting');
        btn.classList.add('exported');
        btn.innerHTML = '&#10003; Done';
        showToast('Downloaded PNG: ' + adName, 'success');
        setTimeout(function() {
          btn.classList.remove('exported');
          btn.innerHTML = origPngHtml;
        }, 3000);
      })
      .catch(function(err) {
        btn.classList.remove('exporting');
        // Fallback to static image if available
        if (fallbackImage) {
          var link = document.createElement('a');
          link.download = slugify(adName) + '.png';
          link.href = '/ads/' + fallbackImage;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          btn.innerHTML = origPngHtml;
          showToast('Downloaded fallback image for ' + adName, 'success');
        } else {
          btn.innerHTML = origPngHtml;
          showToast('PNG export failed: ' + err.message, 'error');
          console.error('PNG export error:', err);
        }
      });
    }

    function bulkExportPng() {
      var cards = document.querySelectorAll('.ad-card');
      if (cards.length === 0) {
        showToast('No ads to export', 'error');
        return;
      }
      var total = cards.length;
      var done = 0;
      var failed = 0;
      showToast('Exporting ' + total + ' ads as PNG...', '');

      var queue = Array.from(cards);
      function processNext() {
        if (queue.length === 0) {
          showToast('Exported ' + done + '/' + total + ' ads as PNG' + (failed > 0 ? ' (' + failed + ' failed)' : ''), 'success');
          return;
        }
        var card = queue.shift();
        var adName = card.querySelector('.info h3').textContent;

        captureFromIframe(card, 'toPng')
        .then(function(dataUrl) {
          downloadDataUrl(dataUrl, slugify(adName) + '.png');
          done++;
          setTimeout(processNext, 300);
        })
        .catch(function() {
          done++;
          failed++;
          setTimeout(processNext, 100);
        });
      }
      processNext();
    }

    // ── ZIP Export for Carousels ──

    function exportAsZip(btn) {
      var card = btn.closest('.ad-card');
      var adName = btn.dataset.name;
      var slides;
      try { slides = JSON.parse(card.dataset.slides || '[]'); } catch (e) { slides = []; }
      if (slides.length === 0) {
        showToast('No slides found for ' + adName, 'error');
        return;
      }

      btn.classList.add('exporting');
      var origHtml = btn.innerHTML;
      btn.innerHTML = '... ZIP';

      var zip = new JSZip();
      var slug = slugify(adName);
      var completed = 0;
      var failed = 0;

      // Create a hidden iframe for capturing each slide
      var tempIframe = document.createElement('iframe');
      tempIframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:1080px;height:1350px;border:none;';
      document.body.appendChild(tempIframe);

      function captureSlide(index) {
        if (index >= slides.length) {
          // All slides processed — generate and download ZIP
          document.body.removeChild(tempIframe);
          if (completed === 0) {
            btn.classList.remove('exporting');
            btn.innerHTML = origHtml;
            showToast('ZIP export failed — no slides captured', 'error');
            return;
          }
          zip.generateAsync({ type: 'blob' }).then(function(blob) {
            var link = document.createElement('a');
            link.download = slug + '.zip';
            link.href = URL.createObjectURL(blob);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            btn.classList.remove('exporting');
            btn.classList.add('exported');
            btn.innerHTML = '&#10003; Done';
            showToast('Downloaded ZIP: ' + adName + ' (' + completed + ' slides)', 'success');
            setTimeout(function() {
              btn.classList.remove('exported');
              btn.innerHTML = origHtml;
            }, 3000);
          });
          return;
        }

        btn.innerHTML = '... ' + (index + 1) + '/' + slides.length;
        tempIframe.src = slides[index];
        tempIframe.onload = function() {
          // Wait for fonts/images to render
          setTimeout(function() {
            ensureHtiInIframe(tempIframe).then(function(win) {
              var isSocial = (slides[index] || '').indexOf('/social/') !== -1;
              var node = isSocial ? win.document.body : (win.document.querySelector('.ad') || win.document.body);
              return win.htmlToImage.toPng(node, {
                width: isSocial ? 1080 : undefined,
                height: isSocial ? 1350 : undefined,
                pixelRatio: 1,
                cacheBust: true,
                style: { borderRadius: '0' }
              });
            }).then(function(dataUrl) {
              var base64 = dataUrl.split(',')[1];
              zip.file(slug + '-' + (index + 1) + '.png', base64, { base64: true });
              completed++;
              captureSlide(index + 1);
            }).catch(function(err) {
              console.error('Failed to capture slide ' + (index + 1) + ':', err);
              failed++;
              captureSlide(index + 1);
            });
          }, 500);
        };
      }

      captureSlide(0);
    }

    // ── Delete Ad ──

    function confirmDeleteAd(btn) {
      var adName = btn.dataset.name;
      var card = btn.closest('.ad-card');
      var source = (card && card.dataset && card.dataset.source) || CURRENT_MODE;
      var dataset = source === 'social' ? SOCIAL : ADS;
      var ad = dataset.find(function(a) { return a.name === adName; });
      if (!ad) return;

      var files = [];
      if (ad.creative_file) files.push(ad.creative_file);
      if (Array.isArray(ad.slides)) ad.slides.forEach(function(s) { files.push(s); });
      if (ad.image) files.push(ad.image);
      files.push((source === 'social' ? 'social.json' : 'ads.json') + ' (entry removed)');

      var overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = '<div class="confirm-dialog">' +
        '<h3>Delete this ' + (source === 'social' ? 'social post' : 'ad') + '?</h3>' +
        '<p>This will permanently remove <strong>' + adName + '</strong> and its files from disk.</p>' +
        '<div class="file-list">' + files.join('<br>') + '</div>' +
        '<div class="confirm-actions">' +
          '<button class="confirm-cancel" onclick="this.closest(\'.confirm-overlay\').remove()">Cancel</button>' +
          '<button class="confirm-delete" data-name="' + adName.replace(/"/g, '&quot;') + '" data-source="' + source + '" onclick="executeDeleteAd(this)">Delete</button>' +
        '</div>' +
      '</div>';

      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
      });
    }

    function executeDeleteAd(btn) {
      var adName = btn.dataset.name;
      var source = btn.dataset.source === 'social' ? 'social' : 'ads';
      var overlay = btn.closest('.confirm-overlay');
      btn.textContent = 'Deleting...';
      btn.disabled = true;

      fetch('/api/delete-ad', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ad_name: adName, source: source })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        overlay.remove();
        if (!data.success) throw new Error(data.error || 'Failed');

        if (source === 'social') {
          SOCIAL = SOCIAL.filter(function(a) { return a.name !== adName; });
        } else {
          ADS = ADS.filter(function(a) { return a.name !== adName; });
        }
        delete DECISIONS[adName];

        var activeFilter = document.querySelector('.toolbar button.active');
        render(activeFilter ? activeFilter.dataset.filter : 'all');

        var label = source === 'social' ? 'social posts' : 'ads';
        showToast('Deleted <strong>' + adName + '</strong> (' + data.remaining + ' ' + label + ' remaining)', 'success');
      })
      .catch(function(err) {
        overlay.remove();
        showToast('Delete failed: ' + err.message, 'error');
      });
    }
  </script>

  <div class="toast-container" id="toast-container"></div>
</body>
