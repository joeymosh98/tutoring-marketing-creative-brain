<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 31A — 3,200 Australian Families</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 64px 56px 56px;
    position: relative;
  }
  .eyebrow {
    white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 10px 28px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }
  .hero-block {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: -20px;
  }
  .hero-number {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 440px;
    line-height: 0.9;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.04em;
  }
  .hero-label {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 58px;
    line-height: 1.05;
    text-align: center;
    color: #004166;
  }
  .hero-sub {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.4;
    text-align: center;
    color: #004166;
    opacity: 0.75;
    max-width: 760px;
    margin-top: 4px;
  }
  .avatar-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
    flex-wrap: nowrap;
  }
  .avatar-dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,65,102,0.12);
  }
  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }
  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="eyebrow"><span>Trusted across Australia 🇦🇺</span></div>

  <div class="hero-block">
    <div class="hero-number">3,200</div>
    <div class="hero-label">Australian families<br>chose Tutero.</div>
    <div class="hero-sub">Different states. Different subjects. Same verdict.</div>
    <div class="avatar-row">
      <div class="avatar-dot" style="background:#1D49E3"></div>
      <div class="avatar-dot" style="background:#2A66E6"></div>
      <div class="avatar-dot" style="background:#0088E8"></div>
      <div class="avatar-dot" style="background:#00A3FF"></div>
      <div class="avatar-dot" style="background:#2CB4DE"></div>
      <div class="avatar-dot" style="background:#4CBDB1"></div>
      <div class="avatar-dot" style="background:#66A693"></div>
      <div class="avatar-dot" style="background:#8BAE6B"></div>
      <div class="avatar-dot" style="background:#B3B254"></div>
      <div class="avatar-dot" style="background:#D3B334"></div>
      <div class="avatar-dot" style="background:#E8A909"></div>
      <div class="avatar-dot" style="background:#EF9708"></div>
      <div class="avatar-dot" style="background:#F38408"></div>
      <div class="avatar-dot" style="background:#FF7A00"></div>
    </div>
  </div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>98.1% Feel More Confident</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Same Tutor Every Week</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Pay Per Lesson</span>
    </div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
