<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 33D — Before Exams Hit</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 56px 56px;
  }
  .eyebrow {
    white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 10px 28px;
    margin-bottom: 20px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }
  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 1.1;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }
  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 38px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 24px;
  }
  .photo-wrap {
    width: 100%;
    flex: 1;
    min-height: 0;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }
  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }
  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="eyebrow"><span>The families who start early don't panic later</span></div>

  <div class="hero-word">Before exams<br>hit.</div>
  <div class="subhead">1-on-1 tutoring, Year 10 – 12 🇦🇺</div>

  <div class="photo-wrap">
    <img src="../images/33d-before-exams.png" alt="Focused teenage student studying with notes and laptop, calm and prepared">
  </div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Build Confidence Before It's Urgent</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>One Tutor Who Knows Their Gaps</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Pay Per Lesson — No Contract</span>
    </div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
