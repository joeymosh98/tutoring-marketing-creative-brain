<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 35J — James T. (Name Badge)</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 48px 56px 56px;
  }

  .hero-statement {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.25;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 28px;
  }

  .photo-wrap {
    width: 100%;
    flex: 1;
    min-height: 0;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
  }

  /* --- Trust Card --- */
  .trust-card {
    position: absolute;
    bottom: 28px;
    left: 28px;
    background: rgba(255, 255, 255, 0.97);
    backdrop-filter: blur(16px);
    border-radius: 18px;
    padding: 24px 28px 22px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12), 0 1px 4px rgba(0, 0, 0, 0.06);
    border-left: 4px solid #00A3FF;
    white-space: nowrap;
  }

  .trust-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .trust-card-name {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #1A1A2E;
    line-height: 1.2;
  }

  .verified-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .trust-card-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #E8F6FF;
    border-radius: 100px;
    padding: 5px 14px;
    margin-bottom: 14px;
  }
  .trust-card-tag span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #0082CC;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .trust-card-divider {
    width: 100%;
    height: 1px;
    background: #E0EEFF;
    margin-bottom: 12px;
  }

  .trust-card-credential {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: #5A5A70;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .trust-card-stats {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .trust-card-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #1A1A2E;
  }
  .trust-card-stat .star {
    color: #E8A909;
    font-size: 16px;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
<style id="toggle-element-styles">.hide-logo .logo { display: none !important; visibility: hidden !important; }.hide-url .url { display: none !important; visibility: hidden !important; }.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }</style><script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script></head>
<body class="">

<div class="ad">
  <div class="hero-statement" style="">Our tutors would love to help your child this term.</div>

  <div class="photo-wrap" style="">
    <img src="../images/35j-tutor-portrait.png" alt="James T. — Qualified Tutero tutor" class="" style="object-position: 50% 56.5%;">

    <div class="trust-card" style="">
      <div class="trust-card-header" style="">
        <span class="trust-card-name" style="">James T.</span>
        <svg class="verified-badge" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="12" fill="#00A3FF" style=""></circle>
          <path d="M7.5 12.5L10.5 15.5L16.5 9.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style=""></path>
        </svg>
      </div>
      <div class="trust-card-tag" style="">
        <span style="">Qualified Tutor</span>
      </div>
      <div class="trust-card-divider" style=""></div>
      <div class="trust-card-credential" style="">B.Sc (Mathematics), University of Sydney</div>
      <div class="trust-card-stats" style="">
        <div class="trust-card-stat" style="">
          <span class="star" style="">★</span> 4.8
        </div>
        <div style="width: 4px; height: 4px; border-radius: 50%; background: rgb(194, 209, 224);"></div>
        <div class="trust-card-stat" style="">180+ lessons</div>
      </div>
    </div>
  </div>

  <div class="footer" style="">
    
    
  </div>
</div>



</body></html>
