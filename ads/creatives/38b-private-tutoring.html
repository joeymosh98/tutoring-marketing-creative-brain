<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .ad {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
    }

    /* Full-bleed background photo */
    .bg-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* Dark gradient overlay — heavy at top and bottom, lighter in middle */
    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(0, 0, 0, 0.75) 0%,
          rgba(0, 0, 0, 0.3) 30%,
          rgba(0, 0, 0, 0.05) 50%,
          rgba(0, 0, 0, 0.35) 70%,
          rgba(0, 0, 0, 0.8) 100%
        );
    }

    /* Content layer */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 64px 60px;
    }

    /* --- TOP: Logo --- */
    .logo-bar {
      display: flex;
      justify-content: center;
    }
    .logo-bar img {
      height: 46px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    /* --- BOTTOM: Headline + footer --- */
    .bottom {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .headline h1 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 900;
      font-size: 96px;
      line-height: 1.0;
      color: #FFFFFF;
      letter-spacing: -2px;
    }
    .headline p {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 48px;
      line-height: 1.2;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 8px;
      letter-spacing: -0.5px;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer img {
      height: 34px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }
    .footer .url {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
<style id="toggle-element-styles">.hide-logo .logo { display: none !important; visibility: hidden !important; }.hide-url .url { display: none !important; visibility: hidden !important; }.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }</style><style class="logo-injected">.logo { position: absolute; bottom: 50px; left: 60px; height: 50px; width: auto; z-index: 10; }</style></head>
<body class="">
<div class="ad">
  <img class="bg-photo" src="../images/38a-student-tutor-lesson.png" alt="Student in online tutoring lesson">
  <div class="overlay"></div>

  <div class="content">
    <!-- Logo top center -->
    <div class="logo-bar" style="transform: translate(0px, 59px);">
      <img src="../images/tutero-logo.svg" alt="Tutero">
    </div>

    <!-- Headline + footer anchored to bottom -->
    <div class="bottom" style="transform: translate(0px, -57px);">
      <div class="headline">
        <h1>Private Tutoring</h1>
        <p>for Prep – Year 12</p>
      </div>
      <div class="footer">
        <img src="../images/tutero-logo.svg" alt="Tutero">
        <span class="url">tutero.com.au</span>
      </div>
    </div>
  </div>
</div>


</body></html>
