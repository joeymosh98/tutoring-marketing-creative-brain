<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .ad {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(175deg, #041028 0%, #0A2460 30%, #0E3FA8 55%, #1A6FD4 75%, #2B8FE8 100%);
      position: relative;
    }

    /* Ambient glow behind the photo */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(43,143,232,0.35) 0%, rgba(10,36,96,0.1) 50%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* --- LOGO --- */
    .logo-bar {
      width: 100%;
      padding: 56px 0 0;
      display: flex;
      justify-content: center;
      z-index: 2;
      flex-shrink: 0;
    }
    .logo-bar img {
      height: 48px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    /* --- HEADLINE --- */
    .headline {
      text-align: center;
      padding: 44px 80px 0;
      z-index: 2;
      flex-shrink: 0;
    }
    .headline h1 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 900;
      font-size: 88px;
      line-height: 1.05;
      color: #FFFFFF;
      letter-spacing: -2px;
    }
    .headline p {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 44px;
      line-height: 1.2;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 10px;
      letter-spacing: -0.5px;
    }

    /* --- PHOTO --- */
    .photo-area {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 64px 56px;
      z-index: 2;
    }
    .photo-frame {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.2),
        0 24px 64px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }
  </style>
</head>
<body>
<div class="ad">
  <div class="glow"></div>

  <!-- Logo -->
  <div class="logo-bar">
    <img src="../images/tutero-logo.svg" alt="Tutero">
  </div>

  <!-- Headline -->
  <div class="headline">
    <h1>Private Tutoring</h1>
    <p>for Prep – Year 12</p>
  </div>

  <!-- Photo -->
  <div class="photo-area">
    <div class="photo-frame">
      <img src="../images/39d-student-tutor-lesson.png" alt="Student in online tutoring lesson">
    </div>
  </div>

</div>
</body>
</html>
