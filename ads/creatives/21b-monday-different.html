<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 21B — Monday Feels Different</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* Blueprint #6 — Horizontal Split */
  .ad {
    width: 1080px;
    height: 1350px;
    border-radius: 0;
    overflow: hidden;
    display: flex;
  }

  .left-zone {
    width: 50%;
    height: 100%;
    overflow: hidden;
  }
  .left-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 40%;
  }

  .right-zone {
    width: 50%;
    height: 100%;
    background: #F0FAFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 48px 56px;
  }

  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1.25;
    margin-bottom: 4px;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 32px;
    line-height: 1.1;
    color: #004166;
    margin-bottom: 40px;
  }

  .ticks {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="left-zone">
    <img src="../images/21b-child-backpack.png" alt="Child sitting on bed with school backpack on Sunday evening">
  </div>

  <div class="right-zone">
    <div class="hero-word">1-on-1 Tutoring</div>

    <div class="subhead">for Prep – Year 12 🇦🇺</div>

    <div class="ticks">
      <div class="tick">
        <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <span>One Tutor Who Knows Her</span>
      </div>
      <div class="tick">
        <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <span>No Commitment Required</span>
      </div>
      <div class="tick">
        <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <span>98.1% Report Improved Confidence</span>
      </div>
    </div>

    <div class="footer">
      <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
      <span class="url">tutero.com.au</span>
    </div>
  </div>
</div>

</body>
</html>
