<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 3A — Meet Your Tutor First</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 56px 44px;
  }

  .eyebrow {
    white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 8px 26px;
    margin-bottom: 12px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 21px;
    color: #004166;
  }

  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 82px;
    line-height: 1.15;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 2px;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 36px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 18px;
  }

  .tutor-grid {
    width: 100%;
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 18px;
  }
  .tutor-cell {
    border-radius: 16px;
    overflow: hidden;
    background: #fff;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tutor-cell img {
    width: 100%;
    flex: 1;
    min-height: 0;
    object-fit: cover;
  }
  .tutor-cell .name-bar {
    padding: 8px 12px;
    text-align: center;
  }
  .tutor-cell .name-bar .name {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 19px;
    color: #004166;
  }
  .tutor-cell .name-bar .detail {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: #5A5A70;
    margin-top: 1px;
  }

  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 11px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 28px;
    height: 28px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
<style id="toggle-element-styles">.hide-logo .logo { display: none !important; visibility: hidden !important; }.hide-url .url { display: none !important; visibility: hidden !important; }.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }</style><script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script></head>
<body class="">

<div class="ad">
  <div class="eyebrow" style=""><span style="">Choose the right tutor.</span></div>

  <div class="hero-word" style="">Online Tutoring</div>
  <div class="subhead" style="">for Prep – Year 12 🇦🇺</div>

  <div class="tutor-grid" style="">
    <div class="tutor-cell" style="">
      <img src="../images/3a-tutor-anna.png" alt="Anna">
      <div class="name-bar" style=""><div class="name" style="">Anna</div><div class="detail" style="">Maths · Yr 7–10</div></div>
    </div>
    <div class="tutor-cell" style="">
      <img src="../images/3a-tutor-liam.png" alt="Liam">
      <div class="name-bar" style=""><div class="name" style="">Liam</div><div class="detail" style="">Science · Yr 5–8</div></div>
    </div>
    <div class="tutor-cell" style="">
      <img src="../images/3a-tutor-priya.png" alt="Priya">
      <div class="name-bar" style=""><div class="name" style="">Priya</div><div class="detail" style="">English · Yr 9–12</div></div>
    </div>
    <div class="tutor-cell" style="">
      <img src="../images/3a-tutor-tom.png" alt="Tom">
      <div class="name-bar" style=""><div class="name" style="">Tom</div><div class="detail" style="">Maths · Yr 3–6</div></div>
    </div>
    <div class="tutor-cell" style="">
      <img src="../images/3a-tutor-hannah.png" alt="Hannah">
      <div class="name-bar" style=""><div class="name" style="">Hannah</div><div class="detail" style="">Maths · Yr 7–10</div></div>
    </div>
    <div class="tutor-cell" style="">
      <img src="../images/3a-tutor-marcus.png" alt="Marcus">
      <div class="name-bar" style=""><div class="name" style="">Marcus</div><div class="detail" style="">Physics · Yr 11–12</div></div>
    </div>
  </div>

  <div class="ticks" style="">
    <div class="tick" style="">
      <div class="tick-check" style=""><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5" style=""></path></svg></div>
      <span style="">Handpicked Tutors Ready for Your Child</span>
    </div>
    <div class="tick" style="">
      <div class="tick-check" style=""><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5" style=""></path></svg></div>
      <span style="">No Contracts - Cancel Anytime</span>
    </div>
    <div class="tick" style="">
      <div class="tick-check" style=""><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5" style=""></path></svg></div>
      <span style="">Every Tutor is Qualified &amp; Vetted</span>
    </div>
  </div>

  <div class="footer" style="">
    
    
  </div>
</div>



</body></html>
