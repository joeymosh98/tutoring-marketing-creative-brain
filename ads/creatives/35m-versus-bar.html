<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 35M — The Versus Bar (Experimental)</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 64px 56px 56px;
    justify-content: space-between;
  }

  .hero-statement {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1.25;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* --- Bar Chart --- */
  .chart {
    display: flex;
    flex-direction: column;
    gap: 48px;
    width: 100%;
  }

  .bar-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bar-label {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .bar-name {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #5A5A70;
  }
  .bar-pct {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #5A5A70;
  }

  .bar-track {
    width: 100%;
    height: 48px;
    background: #E0EEFF;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 12px;
    transition: width 0.6s ease;
  }

  /* Industry bar */
  .bar-fill.industry {
    width: 85%;
    background: #C2D1E0;
  }

  /* Harvard bar */
  .bar-fill.harvard {
    width: 12%;
    background: #8B4C6A;
  }

  /* Tutero bar — gradient, smallest */
  .bar-fill.tutero {
    width: 6%;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 40%, #FF7A00 100%);
  }

  .bar-row.highlight .bar-name {
    color: #1A1A2E;
    font-weight: 700;
    font-size: 26px;
  }
  .bar-row.highlight .bar-pct {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 40px;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 40%, #FF7A00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .bar-row.highlight .bar-track {
    height: 64px;
  }

  .bottom-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .bottom-text {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 36px;
    line-height: 1.35;
    color: #1A1A2E;
  }
  .bottom-cta {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #5A5A70;
  }

  .footer {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="hero-statement">More selective than you think.</div>

  <div class="chart">
    <div class="bar-row">
      <div class="bar-label">
        <span class="bar-name">Average tutoring company</span>
        <span class="bar-pct">~80% acceptance</span>
      </div>
      <div class="bar-track"><div class="bar-fill industry"></div></div>
    </div>

    <div class="bar-row">
      <div class="bar-label">
        <span class="bar-name">Harvard University</span>
        <span class="bar-pct">3.2%</span>
      </div>
      <div class="bar-track"><div class="bar-fill harvard"></div></div>
    </div>

    <div class="bar-row highlight">
      <div class="bar-label">
        <span class="bar-name">Tutero</span>
        <span class="bar-pct">1.3%</span>
      </div>
      <div class="bar-track"><div class="bar-fill tutero"></div></div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="bottom-text">Your child's tutor passed a bar that 98.7% didn't.</div>
    <div class="bottom-cta">No contract. No upfront payment. Book a 1-on-1 lesson →</div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
