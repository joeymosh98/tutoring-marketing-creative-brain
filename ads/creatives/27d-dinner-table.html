<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 27D — Dinner Table</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
  }

  .card {
    position: absolute;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    border-radius: 24px;
    padding: 44px 48px;
    max-width: 820px;
    width: calc(100% - 100px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .card p {
    font-family: 'Satoshi', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.4;
    color: #1a1a1a;
    text-align: center;
  }

  .footer {
    position: absolute;
    bottom: 48px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 28px; width: auto; filter: brightness(0) invert(1); }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<div class="ad">
  <img class="bg-photo" src="../images/10a-dinner-table.png" alt="Family at dinner table, child engaging in conversation">

  <div class="card">
    <p>She stopped shrugging at the dinner table. She started explaining her homework.</p>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
