<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 24B — Built For Her</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }

  .photo-wrap {
    position: absolute;
    top: 80px;
    right: 56px;
    width: 520px;
    height: 650px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,65,102,0.08);
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  .content {
    position: absolute;
    bottom: 56px;
    left: 56px;
    right: 56px;
  }

  .hero-text {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 1.25;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    max-width: 700px;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 32px;
    line-height: 1.1;
    color: #004166;
    margin-bottom: 16px;
  }

  .sub-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.45;
    color: #004166;
    opacity: 0.7;
    max-width: 640px;
    margin-bottom: 40px;
  }

  .details {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }

  .detail-pill {
  white-space: nowrap;
    background: #FFFFFF;
    border-radius: 100px;
    padding: 14px 28px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="photo-wrap">
    <img src="../images/24b-child-alone.png" alt="Girl doing homework alone at kitchen bench">
  </div>

  <div class="content">
    <div class="hero-text">Built for her.</div>
    <div class="subhead">for Prep – Year 12 🇦🇺</div>
    <div class="sub-text">Your second child learns differently. Not worse — differently. One tutor who understands how she thinks. One plan that's hers.</div>

    <div class="details">
      <div class="detail-pill">Try One Lesson First</div>
      <div class="detail-pill">No Contract</div>
    </div>

    <div class="footer">
      <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
      <span class="url">tutero.com.au</span>
    </div>
  </div>
</div>

</body>
</html>
