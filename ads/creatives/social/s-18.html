<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Term 2. Let's Go.</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #FFFDF5;
    color: #004166;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 25%, rgba(255, 213, 79, 0.2), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(255, 183, 77, 0.18), transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 249, 230, 0.4), transparent 65%);
    pointer-events: none;
  }

  .b1, .b2, .b3, .b4, .b5 {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    opacity: 0.14;
  }
  .b1 { top: 80px; left: 100px; font-size: 90px; transform: rotate(-20deg); }
  .b2 { top: 200px; right: 90px; font-size: 64px; transform: rotate(30deg); }
  .b3 { bottom: 260px; left: 70px; font-size: 72px; transform: rotate(15deg); }
  .b4 { bottom: 120px; right: 130px; font-size: 56px; transform: rotate(-35deg); }
  .b5 { top: 520px; left: 480px; font-size: 48px; transform: rotate(45deg); }

  .content {
    position: relative;
    z-index: 1;
    padding: 0 100px;
  }
  .term {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 200px;
    line-height: 0.92;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #E8A909 0%, #FF9800 40%, #FF7A00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 20px;
  }
  .go {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 160px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: #004166;
  }
  .divider {
    width: 140px;
    height: 6px;
    background: linear-gradient(90deg, #FFD54F, #FF9800);
    border-radius: 3px;
    margin: 50px auto 44px;
  }
  .sub {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 46px;
    line-height: 1.3;
    color: #5A8FA8;
    letter-spacing: -0.005em;
  }
  .sub strong {
    color: #004166;
  }
  .footer {
    position: absolute;
    bottom: 70px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 18px;
    color: #B8A060;
  }
</style>
</head>
<body>
  <div class="b1">🍌</div>
  <div class="b2">🍌</div>
  <div class="b3">🍌</div>
  <div class="b4">🍌</div>
  <div class="b5">🍌</div>

  <div class="content">
    <h1 class="term">Term 2.</h1>
    <p class="go">Let's go.</p>
    <div class="divider"></div>
    <p class="sub">New term. <strong>Same tutor.</strong><br>Same person who already knows her.</p>
  </div>

  <p class="footer">Tutero &nbsp;·&nbsp; Term 2, 2026</p>
</body>
</html>
