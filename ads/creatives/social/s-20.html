<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Everything Starts Again on Monday</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #002B44;
    color: #FFFFFF;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 110px;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 25%, rgba(29, 73, 227, 0.12), transparent 45%),
      radial-gradient(ellipse at 85% 75%, rgba(0, 163, 255, 0.08), transparent 50%),
      radial-gradient(ellipse at 50% 90%, rgba(232, 169, 9, 0.06), transparent 40%);
    pointer-events: none;
  }

  .content { position: relative; z-index: 1; max-width: 860px; }

  .eyebrow {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 20px;
    color: #00A3FF;
    margin-bottom: 52px;
  }

  .headline {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 102px;
    line-height: 1.06;
    letter-spacing: -0.025em;
    color: #FFFFFF;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .line-accent {
    width: 100px;
    height: 4px;
    background: linear-gradient(90deg, #1D49E3, #00A3FF, #66A693, #E8A909);
    border-radius: 2px;
    margin: 56px 0 44px;
  }

  .sub {
    font-family: 'Satoshi', sans-serif;
    font-size: 44px;
    line-height: 1.3;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: -0.005em;
    max-width: 720px;
  }

  .footer {
    position: absolute;
    bottom: 70px;
    right: 80px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.25);
  }
</style>
</head>
<body>
  <div class="content">
    <p class="eyebrow">Term 2, 2026</p>
    <h1 class="headline">Everything starts again on <em>Monday.</em></h1>
    <div class="line-accent"></div>
    <p class="sub">This time, she's not starting alone. Her tutor already knows the plan.</p>
  </div>

  <p class="footer">Tutero</p>
</body>
</html>
