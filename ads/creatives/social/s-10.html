<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Is Getting Full</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #F0FAFF;
    color: #004166;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .photo {
    position: relative;
    width: 100%;
    height: 810px;
    background: linear-gradient(160deg, #B6D5EA 0%, #7B9EBE 100%);
    overflow: hidden;
  }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(240,250,255,0.55) 100%);
    pointer-events: none;
  }
  .caption { flex: 1; padding: 60px 90px; display: flex; flex-direction: column; justify-content: center; }
  .eyebrow {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.24em;
    font-size: 20px; color: #0077B6; margin-bottom: 24px;
  }
  .line {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700; font-size: 76px; line-height: 1.08; letter-spacing: -0.02em;
    color: #004166;
  }
  .line em { font-style: normal; background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub {
    margin-top: 18px;
    font-family: 'Satoshi', sans-serif; font-size: 40px; line-height: 1.25; color: #5A8FA8;
  }
</style>
</head>
<body>
  <div class="photo">
    <img src="../../images/s-10-img.png" alt="">
  </div>
  <div class="caption">
    <p class="eyebrow">This week in our inbox</p>
    <h1 class="line">Our April is <em>getting full</em>.</h1>
    <p class="sub">Most Term 2 slots go in the first two weeks.</p>
  </div>
</body>
</html>
