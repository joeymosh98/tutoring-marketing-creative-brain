<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>First Session Free — 4 of 5</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #F0FAFF;
    color: #004166;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .photo {
    position: relative;
    width: 100%;
    height: 840px;
    background:
      linear-gradient(180deg, rgba(240,250,255,0) 0%, rgba(240,250,255,0.35) 100%),
      linear-gradient(160deg, #B0CAE0 0%, #7497B8 100%);
    overflow: hidden;
  }
  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(240,250,255,0.55) 100%);
    pointer-events: none;
  }
  .caption {
    flex: 1;
    padding: 60px 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .step {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    font-size: 20px;
    color: #0077B6;
    margin-bottom: 24px;
  }
  .line {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 58px;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: #004166;
  }
  .line em { font-style: normal; background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
</style>
<style class="logo-injected">.logo { position: absolute; bottom: 50px; left: 60px; height: 50px; width: auto; z-index: 10; }</style></head>
<body class="hide-logo">
  <div class="photo">
    <img src="../../images/s-02-img-4.png" alt="">
  </div>
  <div class="caption">
    <p class="step">Step three</p>
    <h1 class="line">First session with the tutor. <em>If it's not a fit, you can try another.</em></h1>
  </div>


</body></html>
