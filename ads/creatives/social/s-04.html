<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>She Stopped Closing the Door</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #F0FAFF;
    color: #004166;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .photo {
    position: relative;
    width: 100%;
    height: 780px;
    background:
      linear-gradient(180deg, rgba(240,250,255,0) 0%, rgba(240,250,255,0.4) 100%),
      linear-gradient(160deg, #A8C5DC 0%, #6A89A8 100%);
    overflow: hidden;
  }
  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(240,250,255,0.6) 100%);
    pointer-events: none;
  }
  .quote-block {
    flex: 1;
    padding: 60px 100px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .mark {
    font-family: 'Satoshi', sans-serif;
    font-size: 110px;
    line-height: 0.7;
    color: #8BBFDB;
    margin-bottom: 8px;
  }
  .quote {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 1.18;
    letter-spacing: -0.015em;
    color: #004166;
  }
  .attribution {
    margin-top: 34px;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 18px;
    color: #0077B6;
  }
</style>
</head>
<body>
  <div class="photo">
    <img src="../../images/s-04-img.png" alt="">
  </div>
  <div class="quote-block">
    <div class="mark">&ldquo;</div>
    <p class="quote">She didn't tell me tutoring was helping. She just stopped closing her bedroom door when she worked.</p>
    <p class="attribution">Mum of a Year 8 &nbsp;·&nbsp; Sydney</p>
  </div>
</body>
</html>
