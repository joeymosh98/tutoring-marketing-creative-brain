<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>Same Tutor, All Year</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #F0FAFF;
    color: #004166;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    position: relative;
    display: flex;
    align-items: center;
    padding: 120px 110px;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(194, 233, 255, 0.4), transparent 62%);
    pointer-events: none;
  }
  .ad { position: relative; z-index: 1; max-width: 860px; }
  .eyebrow {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.24em;
    font-size: 22px; color: #0077B6; margin-bottom: 48px;
  }
  .headline {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700; font-size: 96px; line-height: 1.05; letter-spacing: -0.02em;
    color: #004166;
  }
  .headline em { font-style: normal; background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .subline {
    margin-top: 44px;
    font-family: 'Satoshi', sans-serif; font-size: 44px; line-height: 1.25; color: #5A8FA8;
    letter-spacing: -0.005em;
  }
  .footer {
    position: absolute;
    left: 110px;
    bottom: 110px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.22em;
    font-size: 18px; color: #6A88A8;
  }
</style>
</head>
<body>
  <div class="ad">
    <p class="eyebrow">how tutero works</p>
    <h1 class="headline">Families who start with us in Term 2 <em>keep the same tutor</em> all year.</h1>
    <p class="subline">Consistency drives real progress.</p>
  </div>
  <p class="footer">Tutero &nbsp;·&nbsp; Term 2, 2026</p>


</body></html>
