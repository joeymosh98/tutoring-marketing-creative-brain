    background: #0a0a0a;

    justify-content: center;

    min-height: 100vh;

  .ad {
    width: 1080px;

    background-clip: text;
    color: transparent;

    width: 100%;
    flex: 1;
    min-height: 0;
    border-radius: 20px;
    overflow: hidden;

  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
