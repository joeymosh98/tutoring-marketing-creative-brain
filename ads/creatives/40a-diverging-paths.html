<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 40A — What 12 Weeks Actually Looks Like</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 56px 56px;
  }

  .eyebrow {
    white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 10px 28px;
    margin-bottom: 20px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 82px;
    line-height: 1.25;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 28px;
  }

  .chart-container {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #FFFFFF;
    border-radius: 20px;
    padding: 40px 48px 36px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }

  .chart-title {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #004166;
    text-align: center;
    margin-bottom: 24px;
  }

  .chart-svg-wrap {
    flex: 1;
    min-height: 0;
    width: 100%;
  }

  .chart-svg-wrap svg {
    width: 100%;
    height: 100%;
  }

  .chart-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
  }

  .chart-label {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
    opacity: 0.6;
  }

  .chart-legend {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }

  .legend-dot.green { background: #22c55e; }
  .legend-dot.red { background: #ef4444; }

  .legend-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: #004166;
  }

  .outcome-labels {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-top: 12px;
    padding: 0 8px;
  }

  .outcome {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-align: center;
    max-width: 45%;
  }

  .outcome.positive { color: #22c55e; }
  .outcome.negative { color: #ef4444; }

  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<style id="toggle-element-styles">.hide-logo .logo { display: none !important; visibility: hidden !important; }.hide-url .url { display: none !important; visibility: hidden !important; }.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }</style></head>
<body class="">

<div class="ad">
  <div class="eyebrow"><span>The Power of 1:1 Tutoring with Tutero.</span></div>

  <div class="hero-word">What 12 Weeks Actually Looks Like</div>
  <div class="subhead">for Prep – Year 12 🇦🇺</div>

  <div class="chart-container">
    <div class="chart-svg-wrap">
      <svg viewBox="0 0 860 380" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- Grid lines -->
        <line x1="60" y1="40" x2="60" y2="320" stroke="#E2E8F0" stroke-width="1.5"></line>
        <line x1="60" y1="320" x2="820" y2="320" stroke="#E2E8F0" stroke-width="1.5"></line>

        <!-- Subtle horizontal guides -->
        <line x1="60" y1="180" x2="820" y2="180" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,6"></line>
        <line x1="60" y1="110" x2="820" y2="110" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,6"></line>
        <line x1="60" y1="250" x2="820" y2="250" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,6"></line>

        <!-- X-axis labels -->
        <text x="60" y="355" font-family="Hanken Grotesk, sans-serif" font-size="20" font-weight="600" fill="#004166" opacity="0.5">Week 1</text>
        <text x="240" y="355" font-family="Hanken Grotesk, sans-serif" font-size="20" font-weight="600" fill="#004166" opacity="0.5" text-anchor="middle">Week 4</text>
        <text x="440" y="355" font-family="Hanken Grotesk, sans-serif" font-size="20" font-weight="600" fill="#004166" opacity="0.5" text-anchor="middle">Week 8</text>
        <text x="680" y="355" font-family="Hanken Grotesk, sans-serif" font-size="20" font-weight="600" fill="#004166" opacity="0.5" text-anchor="middle">Week 12</text>

        <!-- Green line (with 1-on-1 tutor) - curves upward -->
        <path d="M 60 280 C 150 270, 200 240, 280 200 C 360 160, 450 120, 560 85 C 650 60, 720 50, 820 40" stroke="#22c55e" stroke-width="5" fill="none" stroke-linecap="round"></path>

        <!-- Green area fill -->
        <path d="M 60 280 C 150 270, 200 240, 280 200 C 360 160, 450 120, 560 85 C 650 60, 720 50, 820 40 L 820 320 L 60 320 Z" fill="#22c55e" opacity="0.06"></path>

        <!-- Red line (in a class of 30) - stays flat/barely moves -->
        <path d="M 60 280 C 150 278, 200 282, 280 285 C 360 288, 450 290, 560 292 C 650 293, 720 295, 820 298" stroke="#ef4444" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="12,8"></path>

        <!-- End dots -->
        <circle cx="820" cy="40" r="10" fill="#22c55e"></circle>
        <circle cx="820" cy="298" r="10" fill="#ef4444"></circle>

        <!-- Start dot (shared) -->
        <circle cx="60" cy="280" r="8" fill="#004166"></circle>

        <!-- End labels -->
        <text x="790" y="28" font-family="Satoshi, sans-serif" font-size="22" font-weight="700" fill="#22c55e" text-anchor="end">Confident</text>
        <text x="790" y="290" font-family="Satoshi, sans-serif" font-size="22" font-weight="700" fill="#ef4444" text-anchor="end">Still waiting</text>
      </svg>
    </div>

    <div class="chart-legend">
      <div class="legend-item">
        <div class="legend-dot green"></div>
        <span class="legend-text">With a dedicated tutor</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot red"></div>
        <span class="legend-text">In a class of 30</span>
      </div>
    </div>
  </div>

  <div class="ticks" style="">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Lesson Report After Every Session</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>No Contract. No Upfront Payment.</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>4,000+ Australian Families Trust Us</span>
    </div>
  </div>

  <div class="footer">
    
    
  </div>
</div>


</body></html>
