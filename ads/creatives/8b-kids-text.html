<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 8B — The Text You Didn't Expect</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }

  .ad { width: 1080px; height: 1350px; border-radius: 0; overflow: hidden; position: relative; }

  .bg-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,15,30,0.72) 0%, rgba(0,15,30,0.3) 20%, rgba(0,15,30,0.15) 45%, rgba(0,15,30,0.3) 62%, rgba(0,15,30,0.72) 80%, rgba(0,15,30,0.9) 100%); }

  .content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 64px 60px 80px; }

  .hero-word { flex-shrink: 0; font-family: 'Satoshi', sans-serif; font-weight: 900; font-size: 100px; line-height: 1.25; background: linear-gradient(90deg, #5B8CFF 0%, #33C8FF 15%, #7EC9A8 35%, #F5C542 60%, #FF8C33 85%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 4px; }
  .subhead { flex-shrink: 0; font-family: 'Satoshi', sans-serif; font-weight: 900; font-size: 48px; line-height: 1.1; color: #FFFFFF; }

  .phone-area { flex: 1; display: flex; align-items: flex-end; justify-content: flex-start; padding: 20px 0; }
  .imessage { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 85%; padding: 18px 24px; border-radius: 22px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 28px; line-height: 1.4; box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
  .bubble.sent { align-self: flex-end; background: #007AFF; color: #fff; border-bottom-right-radius: 6px; }
  .bubble.received { align-self: flex-start; background: rgba(255,255,255,0.92); color: #1c1c1e; border-bottom-left-radius: 6px; }
  .bubble .sender { font-size: 16px; font-weight: 600; color: #8e8e93; margin-bottom: 6px; }
  .timestamp { text-align: center; font-family: -apple-system, sans-serif; font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }

  .ticks { flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .tick { font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 28px; color: #FFFFFF; display: flex; align-items: center; gap: 12px; white-space: nowrap; }
  .tick .emoji { font-size: 26px; }

  .footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  .footer .logo { height: 34px; width: auto; filter: brightness(0) invert(1); }
  .footer .url { font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: rgba(255,255,255,0.5); }
</style>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script></head>
<body>
<div class="ad">
  <img class="bg-photo" src="../images/8b-mum-phone-dark.png" alt="Mum reading phone in kitchen at night">
  <div class="overlay" style=""></div>

  <div class="content" style="">
    <div class="top-group" style="">
      <div class="hero-word" style="">Private 1:1 Lessons</div>
      <div class="subhead" style="">Expert Tutors 🇦🇺</div>
    </div>

    <div class="phone-area" style="margin-top: 8px;">
      <div class="imessage" style="">
        <div class="timestamp" style="">Tuesday 6:32 PM</div>
        <div class="bubble received" style=""><div class="sender" style="">Lily</div>mum i think tutoring is helping</div>
        <div class="bubble sent" style="">im so happy to hear that ❤️</div>
        <div class="bubble received" style="">hannah is actually really nice</div>
        <div class="bubble received" style="">she makes maths make sense</div>
      </div>
    </div>

    <div class="bottom-group" style="">
      <div class="ticks" style="">
        <div class="tick" style=""><span class="emoji" style=""><br style=""></span></div>
        <div class="tick" style=""><span class="emoji" style="">✅</span> No Lock-in Contract</div>
        <div class="tick" style=""><span class="emoji" style="">✅</span> Written Lesson Report After Every Session</div>
        <div class="tick" style=""><span class="emoji" style="">✅&nbsp; Qualified Tutors &amp; Teachers</span></div>
      </div>
      <div class="footer" style="">
        <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
        <span class="url" style="">tutero.com.au</span>
      </div>
    </div>
  </div>
</div>


</body></html>
