<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 8A — Mum Can We Keep Doing Tuesdays</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }

  .ad { width: 1080px; height: 1350px; background: #F0FAFF; border-radius: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding: 48px 56px 56px; }

  .eyebrow {
  white-space: nowrap; flex-shrink: 0; background: #C2E9FF; border-radius: 100px; padding: 10px 28px; margin-bottom: 20px; }
  .eyebrow span { font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 22px; color: #004166; }

  .hero-word { flex-shrink: 0; font-family: 'Satoshi', sans-serif; font-weight: 900; font-size: 104px; line-height: 1.25; text-align: center; background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 4px; }

  .subhead { flex-shrink: 0; font-family: 'Satoshi', sans-serif; font-weight: 900; font-size: 42px; line-height: 1.1; text-align: center; color: #004166; margin-bottom: 24px; }

  .photo-wrap { width: 100%; flex: 1; min-height: 0; border-radius: 20px; overflow: hidden; margin-bottom: 20px; position: relative; }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .photo-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%); display: flex; align-items: center; justify-content: center; padding: 40px; }

  .imessage { width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 85%; padding: 18px 24px; border-radius: 22px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 28px; line-height: 1.4; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .bubble.sent { align-self: flex-end; background: #007AFF; color: #fff; border-bottom-right-radius: 6px; }
  .bubble.received { align-self: flex-start; background: #e5e5ea; color: #1c1c1e; border-bottom-left-radius: 6px; }
  .bubble .sender { font-size: 16px; font-weight: 600; color: #8e8e93; margin-bottom: 6px; }
  .timestamp { text-align: center; font-family: -apple-system, sans-serif; font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 6px; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }

  .ticks { flex-shrink: 0; width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .tick { background: #FFFFFF; border-radius: 14px; padding: 14px 22px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(0,65,102,0.06); }
  .tick-check { width: 30px; height: 30px; background: #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span { font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 22px; color: #004166; white-space: nowrap; }

  .footer { flex-shrink: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .footer .logo { height: 34px; width: auto; }
  .footer .url { font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: #004166; opacity: 0.5; }
</style>
</head>
<body>
<div class="ad">
  <div class="eyebrow"><span>She asked. Not you. Her.</span></div>
  <div class="hero-word">Online Tutoring</div>
  <div class="subhead">for Prep – Year 12 🇦🇺</div>

  <div class="photo-wrap">
    <img src="../images/8a-mum-phone-couch.png" alt="Mum smiling at her phone on the couch">
    <div class="photo-overlay">
      <div class="imessage">
        <div class="timestamp">Tuesday 6:32 PM</div>
        <div class="bubble received"><div class="sender">Lily</div>mum can we keep doing tuesdays? 🥺</div>
        <div class="bubble sent">Of course we can ❤️</div>
        <div class="bubble received">miss hannah is actually really nice</div>
        <div class="bubble received">she makes maths make sense</div>
      </div>
    </div>
  </div>

  <div class="ticks">
    <div class="tick"><div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><span>Same Teacher Every Week</span></div>
    <div class="tick"><div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><span>No Lock-in Contract</span></div>
    <div class="tick"><div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><span>Pay Per Lesson</span></div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>
</body>
</html>
