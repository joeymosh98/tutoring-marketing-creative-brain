<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 23B — The One Who Stays</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 56px 56px;
  }

  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 104px;
    line-height: 1.25;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 28px;
  }

  .inset-frame {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #FFFFFF;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,65,102,0.08);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .inset-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    border-radius: 16px;
  }

  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
<style id="toggle-element-styles">.hide-logo .logo { display: none !important; visibility: hidden !important; }.hide-url .url { display: none !important; visibility: hidden !important; }.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }</style></head>
<body class="">

<div class="ad">
  <div class="hero-word">Online Tutoring</div>
  <div class="subhead">for Prep – Year 12 🇦🇺</div>

  <div class="inset-frame">
    <img src="../images/23b-tutor-laptop.png" alt="Tutor smiling during online lesson on laptop screen">
  </div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>The Same Tutor Every Week</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Personalised Lessons for Your Child</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Our Tutors Are Chosen From 30,000+ Applicants</span>
    </div>
  </div>

  <div class="footer">
    
    
  </div>
</div>



</body></html>
