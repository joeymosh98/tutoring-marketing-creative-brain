<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 18E — 4,000+ Families Chose Their Tutor</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 56px 56px;
  }

  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 104px;
    line-height: 1.25;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 32px;
  }

  .polaroid-row {
    width: 100%;
    flex: 1;
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .polaroid {
    width: 280px;
    background: #FFFFFF;
    border-radius: 12px;
    padding: 12px 12px 40px;
    box-shadow: 0 4px 16px rgba(0,65,102,0.10);
  }
  .polaroid:nth-child(1) { transform: rotate(-4deg); }
  .polaroid:nth-child(2) { transform: rotate(1deg); z-index: 1; }
  .polaroid:nth-child(3) { transform: rotate(3deg); }

  .polaroid img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    object-position: center 30%;
    border-radius: 6px;
  }

  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
<style id="toggle-element-styles">.hide-logo .logo { display: none !important; visibility: hidden !important; }.hide-url .url { display: none !important; visibility: hidden !important; }.hide-eyebrow .eyebrow, .hide-eyebrow .detail-pill, .hide-eyebrow .cta-pill { display: none !important; visibility: hidden !important; }</style></head>
<body class="">

<div class="ad">
  <div class="hero-word" style="margin-top: 100px; margin-left: 13px;">1:1 Tutoring</div>
  <div class="subhead">for Prep – Year 12 🇦🇺</div>

  <div class="polaroid-row" style="margin-top: -100px; margin-left: 14px;">
    <div class="polaroid">
      <img src="../images/18e-polaroid-1.png" alt="Mum and daughter at kitchen table with laptop">
    </div>
    <div class="polaroid">
      <img src="../images/18e-polaroid-2.png" alt="Dad and son at kitchen bench with laptop">
    </div>
    <div class="polaroid">
      <img src="../images/18e-polaroid-3.png" alt="Mum and teen daughter on couch with laptop">
    </div>
  </div>

  <div class="ticks" style="margin-top: -25px; margin-left: 7px;">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Every Family Gets a Dedicated Tutor</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Cancel Anytime</span>
    </div>
  </div>

  <div class="footer">
    
    
  </div>
</div>



</body></html>
