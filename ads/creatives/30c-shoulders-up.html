<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 30C — Shoulders Up</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    overflow: hidden;
    position: relative;
  }
  .photo-wrap {
    position: absolute;
    top: 80px;
    right: 56px;
    width: 520px;
    height: 650px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,65,102,0.08);
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }
  .stat-block {
    position: absolute;
    top: 90px;
    left: 56px;
    width: 420px;
  }
  .stat-number {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 200px;
    line-height: 0.95;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .stat-label {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 34px;
    line-height: 1.2;
    color: #004166;
    margin-top: 12px;
    max-width: 380px;
  }
  .content {
    position: absolute;
    bottom: 56px;
    left: 56px;
    right: 56px;
  }
  .hero-text {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 88px;
    line-height: 1.05;
    color: #004166;
    margin-bottom: 20px;
    max-width: 820px;
  }
  .hero-text .accent {
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.45;
    color: #004166;
    opacity: 0.75;
    max-width: 760px;
    margin-bottom: 32px;
  }
  .details {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .detail-pill {
    white-space: nowrap;
    background: #FFFFFF;
    border-radius: 100px;
    padding: 14px 28px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .footer {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="photo-wrap">
    <img src="../images/30c-shoulders-up.png" alt="Child striding confidently into school, bag on, shoulders back">
  </div>

  <div class="stat-block">
    <div class="stat-number"><br></div>
    <div class="stat-label"><br></div>
  </div>

  <div class="content">
    <div class="hero-text">Shoulders up. Bag on. <span class="accent">Gone.</span></div>
    <div class="sub-text">1-on-1 tutoring can give your child incredible confidence and self-belief.&nbsp;</div>

    <div class="details">
      <div class="detail-pill">1-on-1 Lessons with a Qualified Tutor</div>
      <div class="detail-pill">Cancel Anytime</div>
    </div>

    <div class="footer">
      <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
      <span class="url">tutero.com.au</span>
    </div>
  </div>
</div>



</body></html>
