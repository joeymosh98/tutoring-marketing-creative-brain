<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 20B — Apps Don't Notice</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* Layout Blueprint #4 — The Stacked Headline
     Typographic rhythm: 5 lines alternating large/small, gradient/solid.
     The headline IS the visual. No photo. */
  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px 56px;
  }

  .stack {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 48px;
  }

  .line-large {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 82px;
    line-height: 1.25;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .line-small {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 44px;
    line-height: 1.35;
    color: #004166;
    opacity: 0.5;
    padding-left: 4px;
  }

  .line-final {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 82px;
    line-height: 1.25;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-top: 20px;
  }

  .body-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.5;
    color: #004166;
    opacity: 0.7;
    max-width: 820px;
    margin-bottom: 48px;
  }

  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="stack">
    <div class="line-large">An app can teach</div>
    <div class="line-small">a formula.</div>
    <div class="line-large">It can't notice</div>
    <div class="line-small">your child</div>
    <div class="line-final">gave up.</div>
  </div>

  <div class="body-text">One tutor. Same person every week. They know your child's name and notice the moment they go quiet.</div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Same Tutor Every Week</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>No Lock-in Contract</span>
    </div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
