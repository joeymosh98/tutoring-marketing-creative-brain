<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 38G — Find a Tutor Who Changes Your Child's Life</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .ad {
    width: 1080px;
    height: 1350px;
    border-radius: 0;
    overflow: hidden;
    position: relative;
    background: #1A1A2E;
  }
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.7) 100%);
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 56px 56px;
  }
  .top-bar { display: flex; align-items: center; }
  .top-bar .logo { height: 36px; width: auto; filter: brightness(0) invert(1); }
  .bottom-section { display: flex; flex-direction: column; gap: 28px; }
  .headline {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.15;
    color: #ffffff;
    max-width: 900px;
  }
  .testimonial-card {
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(16px);
    border-radius: 16px;
    padding: 28px 32px 26px;
    max-width: 680px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }
  .stars { display: flex; gap: 4px; margin-bottom: 14px; }
  .star-icon { width: 22px; height: 22px; }
  .testimonial-quote {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 19px;
    line-height: 1.5;
    color: #1A1A2E;
    margin-bottom: 14px;
  }
  .testimonial-footer { display: flex; justify-content: space-between; align-items: center; }
  .testimonial-source { font-family: 'Hanken Grotesk', sans-serif; font-weight: 500; font-size: 15px; color: #5A5A70; }
  .testimonial-url { font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 15px; color: #5A5A70; }
</style>
</head>
<body>
<div class="ad">
  <img class="bg-photo" src="../images/38g-joyful-girl.png" alt="Joyful teenage girl on backyard patio">
  <div class="overlay"></div>
  <div class="content">
    <div class="top-bar">
      <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    </div>
    <div class="bottom-section">
      <div class="headline">Find a tutor who changes your child's life.</div>
      <div class="testimonial-card">
        <div class="stars">
          <svg class="star-icon" viewBox="0 0 24 24" fill="#1A1A2E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
          <svg class="star-icon" viewBox="0 0 24 24" fill="#1A1A2E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
          <svg class="star-icon" viewBox="0 0 24 24" fill="#1A1A2E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
          <svg class="star-icon" viewBox="0 0 24 24" fill="#1A1A2E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
          <svg class="star-icon" viewBox="0 0 24 24" fill="#1A1A2E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
        </div>
        <div class="testimonial-quote">"We have been extremely impressed with Tutero. Excellent service and my daughter really enjoys her sessions and is getting a lot out of them. 10/10 from us."</div>
        <div class="testimonial-footer">
          <div class="testimonial-source">— Trustpilot Review</div>
          <div class="testimonial-url">tutero.com.au</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
