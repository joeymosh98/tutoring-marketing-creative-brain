<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 31B — From Broome To Ballarat</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 56px 56px;
  }
  .eyebrow {
    white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 10px 28px;
    margin-bottom: 20px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }
  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 88px;
    line-height: 1.05;
    text-align: center;
    color: #004166;
    margin-bottom: 6px;
  }
  .hero-word .accent {
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 25%, #66A693 50%, #E8A909 75%, #FF7A00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 32px;
    line-height: 1.2;
    text-align: center;
    color: #004166;
    margin-bottom: 20px;
    opacity: 0.8;
  }
  .map-wrap {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #FFFFFF;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .map-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }
  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="eyebrow"><span>3,200 families, every state 🇦🇺</span></div>

  <div class="hero-word">Broome to <span class="accent">Ballarat.</span></div>
  <div class="subhead">Cairns to Hobart. One tutor at a time.</div>

  <div class="map-wrap">
    <svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <!-- Australia mainland outline -->
      <path d="M 170 200 L 230 175 L 340 150 L 380 130 L 420 170 L 470 190 L 560 80 L 580 190 L 620 270 L 685 370 L 665 420 L 580 495 L 560 490 L 480 495 L 380 510 L 250 490 L 160 475 L 120 435 L 85 325 L 100 260 L 145 220 Z"
        fill="#F0FAFF" stroke="#C2E9FF" stroke-width="3"/>

      <!-- Tasmania -->
      <path d="M 555 530 L 600 535 L 610 570 L 565 585 Z"
        fill="#F0FAFF" stroke="#C2E9FF" stroke-width="3"/>

      <!-- Scattered family dots (small) — representing the 3,200 -->
      <circle cx="220" cy="285" r="3.5" fill="#00A3FF"/>
      <circle cx="260" cy="240" r="3.5" fill="#1D49E3"/>
      <circle cx="310" cy="210" r="3.5" fill="#00A3FF"/>
      <circle cx="190" cy="355" r="3.5" fill="#2CB4DE"/>
      <circle cx="155" cy="390" r="3.5" fill="#00A3FF"/>
      <circle cx="175" cy="455" r="3.5" fill="#2A66E6"/>
      <circle cx="230" cy="470" r="3.5" fill="#66A693"/>
      <circle cx="295" cy="480" r="3.5" fill="#66A693"/>
      <circle cx="350" cy="450" r="3.5" fill="#4CBDB1"/>
      <circle cx="330" cy="400" r="3.5" fill="#8BAE6B"/>
      <circle cx="290" cy="340" r="3.5" fill="#66A693"/>
      <circle cx="370" cy="280" r="3.5" fill="#E8A909"/>
      <circle cx="420" cy="240" r="3.5" fill="#E8A909"/>
      <circle cx="445" cy="310" r="3.5" fill="#66A693"/>
      <circle cx="440" cy="385" r="3.5" fill="#D3B334"/>
      <circle cx="490" cy="440" r="3.5" fill="#E8A909"/>
      <circle cx="515" cy="390" r="3.5" fill="#E8A909"/>
      <circle cx="520" cy="300" r="3.5" fill="#E8A909"/>
      <circle cx="490" cy="230" r="3.5" fill="#EF9708"/>
      <circle cx="540" cy="170" r="3.5" fill="#EF9708"/>
      <circle cx="575" cy="230" r="3.5" fill="#FF7A00"/>
      <circle cx="590" cy="310" r="3.5" fill="#F38408"/>
      <circle cx="625" cy="345" r="3.5" fill="#FF7A00"/>
      <circle cx="640" cy="395" r="3.5" fill="#FF7A00"/>
      <circle cx="615" cy="440" r="3.5" fill="#F38408"/>
      <circle cx="555" cy="470" r="3.5" fill="#E8A909"/>
      <circle cx="605" cy="480" r="3.5" fill="#FF7A00"/>
      <circle cx="520" cy="445" r="3.5" fill="#D3B334"/>

      <!-- Major city dots (bigger, with halo) -->
      <circle cx="340" cy="140" r="14" fill="#1D49E3" opacity="0.18"/>
      <circle cx="340" cy="140" r="7" fill="#1D49E3"/>

      <circle cx="135" cy="420" r="14" fill="#00A3FF" opacity="0.18"/>
      <circle cx="135" cy="420" r="7" fill="#00A3FF"/>

      <circle cx="455" cy="470" r="14" fill="#66A693" opacity="0.18"/>
      <circle cx="455" cy="470" r="7" fill="#66A693"/>

      <circle cx="560" cy="490" r="14" fill="#E8A909" opacity="0.18"/>
      <circle cx="560" cy="490" r="7" fill="#E8A909"/>

      <circle cx="660" cy="415" r="14" fill="#FF7A00" opacity="0.18"/>
      <circle cx="660" cy="415" r="7" fill="#FF7A00"/>

      <circle cx="680" cy="365" r="14" fill="#FF7A00" opacity="0.18"/>
      <circle cx="680" cy="365" r="7" fill="#FF7A00"/>

      <circle cx="580" cy="555" r="14" fill="#E8A909" opacity="0.18"/>
      <circle cx="580" cy="555" r="7" fill="#E8A909"/>
    </svg>
  </div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>3,200 Australian Families Trust Tutero</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Same Tutor Every Week</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Pay Per Lesson</span>
    </div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
