<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 28A — Every Family (Image-Rich)</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 44px 52px 48px;
  }

  /* — Eyebrow — */
  .eyebrow {
  white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 10px 28px;
    margin-bottom: 16px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  /* — Headline — */
  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 88px;
    line-height: 1.15;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }
  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 36px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 20px;
  }

  /* — Hero photo — */
  .photo-wrap {
    width: 100%;
    flex: 1;
    min-height: 0;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
  }

  /* — Tutor strip — */
  .tutor-strip {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin-bottom: 18px;
  }
  .tutor-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border-radius: 60px;
    padding: 8px 20px 8px 8px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tutor-card img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 20%;
  }
  .tutor-info {
    display: flex;
    flex-direction: column;
  }
  .tutor-name {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #004166;
    line-height: 1.2;
  }
  .tutor-detail {
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 14px;
    color: #5A5A70;
    line-height: 1.2;
  }

  /* — Ticks — */
  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .tick {
    flex: 1;
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 26px;
    height: 26px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 14px; height: 14px; }
  .tick span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    line-height: 1.25;
  }

  /* — Footer — */
  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  <div class="eyebrow"><span>4,000+ Australian families already have this</span></div>

  <div class="hero-word">1:1 Online Tutoring</div>
  <div class="subhead">Prep – Year 12 with a Real Tutor</div>

  <div class="photo-wrap">
    <img src="../images/13a-kid-laptop-mum.png" alt="Child in an online tutoring session with mum nearby">
  </div>

  <div class="tutor-strip">
    <div class="tutor-card">
      <img src="../images/18c-anna.png" alt="Anna">
      <div class="tutor-info">
        <span class="tutor-name">Anna</span>
        <span class="tutor-detail">Maths · Year 3–6</span>
      </div>
    </div>
    <div class="tutor-card">
      <img src="../images/18c-liam.png" alt="Liam">
      <div class="tutor-info">
        <span class="tutor-name">Liam</span>
        <span class="tutor-detail">Science · Year 7–10</span>
      </div>
    </div>
    <div class="tutor-card">
      <img src="../images/18c-priya.png" alt="Priya">
      <div class="tutor-info">
        <span class="tutor-name">Priya</span>
        <span class="tutor-detail">English · Year 9–12</span>
      </div>
    </div>
    <div class="tutor-card">
      <img src="../images/18c-hannah.png" alt="Hannah">
      <div class="tutor-info">
        <span class="tutor-name">Hannah</span>
        <span class="tutor-detail">Reading · Prep–Yr 2</span>
      </div>
    </div>
  </div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Matched with a real tutor</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>Your own education manager</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span>No lock-in contract</span>
    </div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>

</body>
</html>
