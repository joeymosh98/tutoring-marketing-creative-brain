<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 4B — Less Worry. More Anna.</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    background: #F0FAFF;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 56px 56px;
  }

  .eyebrow {
  white-space: nowrap;
    flex-shrink: 0;
    background: #C2E9FF;
    border-radius: 100px;
    padding: 10px 28px;
    margin-bottom: 20px;
  }
  .eyebrow span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .hero-word {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 100px;
    line-height: 1.25;
    text-align: center;
    background: linear-gradient(90deg, #1D49E3 0%, #00A3FF 15%, #66A693 35%, #E8A909 60%, #FF7A00 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }

  .subhead {
    flex-shrink: 0;
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1.1;
    text-align: center;
    color: #004166;
    margin-bottom: 28px;
  }

  /* Testimonial card */
  .quote-card {
    flex: 1;
    min-height: 0;
    width: 100%;
    background: #FFFFFF;
    border-radius: 24px;
    padding: 48px 44px;
    box-shadow: 0 4px 20px rgba(0,65,102,0.08);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 24px;
    position: relative;
  }

  .quote-mark {
    font-family: 'Satoshi', sans-serif;
    font-weight: 900;
    font-size: 120px;
    line-height: 0.6;
    color: #C2E9FF;
    position: absolute;
    top: 36px;
    left: 40px;
  }

  .quote-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 36px;
    line-height: 1.4;
    color: #004166;
    text-align: center;
    max-width: 860px;
    position: relative;
    z-index: 1;
  }

  .quote-attribution {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 28px;
  }
  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .attribution-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: #5A5A70;
  }

  /* Ticks */
  .ticks {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tick {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,65,102,0.06);
  }
  .tick-check {
    width: 30px;
    height: 30px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tick-check svg { width: 16px; height: 16px; }
  .tick span {
    white-space: nowrap;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #004166;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer .logo { height: 34px; width: auto; }
  .footer .url {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #004166;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="ad">
  

  <div class="hero-word">1-on-1 Tutoring</div>
  <div class="subhead">for Prep – Year 12 🇦🇺</div>

  <div class="quote-card" style="margin-top: 211px; margin-left: 5px; transform: translate(-1px, -135px);">
    <div class="quote-mark">"</div>
    <p class="quote-text">"I spent months thinking I was failing him. Then I rang Tutero and met Anna. Now I worry less."</p>
    <div class="quote-attribution">
      <div class="avatar">
        <img src="../images/4b-mum-testimonial.png" alt="Parent">
      </div>
      <span class="attribution-text">— Mum of Year 5 boy, Sydney</span>
    </div>
  </div>

  <div class="ticks">
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>She Reads Every Lesson Report</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Written Progress Summary Each Session</span>
    </div>
    <div class="tick">
      <div class="tick-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></div>
      <span>Cancel Anytime — No Contract</span>
    </div>
  </div>

  <div class="footer">
    <img class="logo" src="../images/tutero-logo.svg" alt="Tutero">
    <span class="url">tutero.com.au</span>
  </div>
</div>



</body></html>
